<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1A1209;
    --bgCard: #231A0E;
    --bgPanel: #2D2010;
    --gold: #D9C49D;
    --goldBright: #E8D5A8;
    --goldDim: #A89060;
    --goldFaint: rgba(217,196,157,0.12);
    --goldBorder: rgba(217,196,157,0.25);
    --text: #F0E6CC;
    --textMuted: #8A7A60;
    --error: #C0614A;
    --success: #7A9A6A;
    --warn: #B8882A;
  }
  body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LAYOUT ── */
  #app { display: flex; min-height: 100vh; }
  #sidebar {
    width: 220px; min-height: 100vh; background: var(--bgCard);
    border-right: 1px solid var(--goldBorder); display: flex;
    flex-direction: column; flex-shrink: 0;
  }
  #main { flex: 1; overflow-y: auto; max-height: 100vh; }

  /* ── SIDEBAR ── */
  .sb-header { padding: 24px 20px; border-bottom: 1px solid var(--goldBorder); display: flex; align-items: center; gap: 12px; }
  .sb-brand-name { font-size: 11px; font-weight: 700; letter-spacing: .15em; color: var(--gold); text-transform: uppercase; }
  .sb-brand-sub { font-size: 9px; color: var(--goldDim); letter-spacing: .1em; }
  .sb-user { padding: 16px 20px; border-bottom: 1px solid var(--goldBorder); }
  .sb-user-name { font-size: 12px; color: var(--text); font-weight: 600; }
  .sb-user-role { font-size: 10px; color: var(--goldDim); letter-spacing: .1em; text-transform: uppercase; margin-top: 2px; }
  nav { flex: 1; padding: 12px 0; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 20px;
    cursor: pointer; font-size: 12px; font-weight: 400; letter-spacing: .05em;
    color: var(--textMuted); border-left: 2px solid transparent; transition: all .15s;
  }
  .nav-item.active { background: var(--goldFaint); border-left-color: var(--gold); color: var(--gold); font-weight: 600; }
  .nav-item:hover:not(.active) { color: var(--goldDim); }
  .nav-icon { font-size: 14px; opacity: .8; }
  .sb-footer { padding: 16px 20px; border-top: 1px solid var(--goldBorder); }
  .logout-btn { font-size: 11px; color: var(--textMuted); cursor: pointer; letter-spacing: .08em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .logout-btn:hover { color: var(--gold); }

  /* ── CARDS ── */
  .card {
    background: var(--bgCard); border: 1px solid var(--goldBorder); border-radius: 4px;
    padding: 20px; transition: border-color .2s, box-shadow .2s;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: var(--goldDim); box-shadow: 0 4px 24px rgba(217,196,157,.08); }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase; padding: 10px 20px;
    border: none; border-radius: 2px; cursor: pointer; transition: all .2s;
  }
  .btn-primary { background: var(--gold); color: var(--bg); }
  .btn-primary:hover { background: var(--goldBright); }
  .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
  .btn-outline:hover { color: var(--goldBright); border-color: var(--goldBright); }
  .btn-ghost { background: transparent; color: var(--goldDim); border: 1px solid transparent; }
  .btn-ghost:hover { background: var(--goldFaint); color: var(--goldBright); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── INPUTS ── */
  .field { margin-bottom: 16px; }
  .field-label { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--goldDim); margin-bottom: 6px; }
  .field-input {
    width: 100%; background: var(--bgPanel); border: 1px solid var(--goldBorder);
    color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 14px;
    padding: 10px 14px; border-radius: 2px; outline: none; transition: border-color .2s;
  }
  .field-input:focus { border-color: var(--gold); }

  /* ── BADGES ── */
  .badge {
    font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px; border: 1px solid currentColor; display: inline-block;
  }

  /* ── PROGRESS ── */
  .progress-track { background: var(--goldFaint); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--goldDim), var(--goldBright));
    transition: width .8s cubic-bezier(.4,0,.2,1);
  }

  /* ── DIVIDER ── */
  .gold-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
  .gold-divider::before, .gold-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--goldBorder));
  }
  .gold-divider::after { background: linear-gradient(90deg, var(--goldBorder), transparent); }
  .gold-divider-diamond { width: 4px; height: 4px; background: var(--goldDim); transform: rotate(45deg); }

  /* ── ORNAMENTAL BORDER ── */
  .ornamental { position: relative; }
  .ornamental-inner { position: relative; z-index: 1; }
  .corner { position: absolute; width: 24px; height: 24px; z-index: 2; }
  .corner.tl { top: 8px; left: 8px; }
  .corner.tr { top: 8px; right: 8px; }
  .corner.bl { bottom: 8px; left: 8px; }
  .corner.br { bottom: 8px; right: 8px; }
  .orn-line-top, .orn-line-bottom { position: absolute; left: 16px; right: 16px; height: 1px; background: linear-gradient(90deg, transparent, var(--goldBorder), transparent); }
  .orn-line-top { top: 16px; }
  .orn-line-bottom { bottom: 16px; }
  .orn-line-left, .orn-line-right { position: absolute; top: 16px; bottom: 16px; width: 1px; background: linear-gradient(180deg, transparent, var(--goldBorder), transparent); }
  .orn-line-left { left: 16px; }
  .orn-line-right { right: 16px; }

  /* ── SECTION HEADERS ── */
  .section-super { letter-spacing: .2em; font-size: 10px; color: var(--goldDim); text-transform: uppercase; margin-bottom: 8px; }
  .section-title { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: .05em; margin-bottom: 4px; }
  .section-sub { font-size: 11px; color: var(--textMuted); margin-bottom: 28px; }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, rgba(217,196,157,.06) 0%, transparent 70%);
  }
  #login-box { width: 380px; }
  #login-box-inner { padding: 48px 40px; text-align: center; }
  .login-brand { margin-top: 20px; letter-spacing: .35em; font-size: 13px; font-weight: 700; color: var(--gold); text-transform: uppercase; }
  .login-brand-sub { letter-spacing: .15em; font-size: 10px; color: var(--goldDim); text-transform: uppercase; margin-top: 4px; margin-bottom: 8px; }

  /* ── VIEWS ── */
  .view { padding: 32px; }
  .hidden { display: none !important; }

  /* ── GRID HELPERS ── */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .col-stack { display: flex; flex-direction: column; gap: 16px; }
  .col-stack-sm { display: flex; flex-direction: column; gap: 8px; }
  .col-stack-xs { display: flex; flex-direction: column; gap: 10px; }

  /* ── TABS ── */
  .tabs { display: flex; border-bottom: 1px solid var(--goldBorder); margin-bottom: 20px; }
  .tab {
    padding: 10px 20px; cursor: pointer; font-size: 11px; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase; color: var(--textMuted);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── KPI CARD ── */
  .kpi-icon { font-size: 22px; margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 700; line-height: 1; }
  .kpi-label { font-size: 10px; color: var(--textMuted); letter-spacing: .08em; text-transform: uppercase; margin-top: 6px; }

  /* ── UPLOAD MOCK ── */
  .upload-zone {
    margin-top: 12px; padding: 16px; background: var(--bgPanel);
    border: 1px dashed var(--goldBorder); border-radius: 2px; text-align: center;

  /* ── NOTIF ── */

  .notif-icon { font-size: 18px; width: 24px; text-align: center; }
  .notif-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

  #supabase-status.connected { color: var(--success); border: 1px solid var(--success); background: rgba(122,154,106,.1); }
  #supabase-status.error { color: var(--error); border: 1px solid var(--error); background: rgba(192,97,74,.1); }

    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
    #sidebar { width: 180px; }
  }
</style>

// ─── SUPABASE CLIENT (lightweight, sin SDK) ────────────────────────────────────
const db = {
  async query(table, params = '') {
    if (!SUPABASE_ANON_KEY) return null;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        }
      });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    } catch(e) { console.warn('Supabase:', e); return null; }
  },
  async insert(table, data) {
    if (!SUPABASE_ANON_KEY) return null;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    } catch(e) { console.warn('Supabase insert:', e); return null; }
  },
  async patch(table, id, data) {
    if (!SUPABASE_ANON_KEY) return null;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    } catch(e) { console.warn('Supabase patch:', e); return null; }
  }
};

async function checkSupabase() {
  const el = document.getElementById('supabase-status');
  if (!SUPABASE_ANON_KEY) {
    el.textContent = '⚠ Supabase: sin clave API'; el.className = 'connecting';
    return;
  }
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/`, { headers: { 'apikey': SUPABASE_ANON_KEY } });
    if (r.ok || r.status === 200) { el.textContent = '⬡ Supabase conectado'; el.className = 'connected'; }
    else throw new Error();
  } catch { el.textContent = '✕ Supabase error'; el.className = 'error'; }
}

function progressBar(val, h=4) {

// ─── LOGIN / LOGOUT ───────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');

  btn.disabled = true; btn.textContent = 'Accediendo…'; errEl.style.display = 'none';

  // Try Supabase first
  if (SUPABASE_ANON_KEY) {
    const rows = await db.query('users', `?email=eq.${encodeURIComponent(email)}&select=*`);
    if (rows && rows.length > 0 && rows[0].password === pass) {
      const u = rows[0];
      currentUser = { id:u.id, name:u.name, role:u.role, email:u.email };
      startApp(); return;
    }
  }

  // Fallback: mock data
  setTimeout(() => {
    const u = USERS[email];
    if (u && u.pass === pass) { currentUser = u; startApp(); }
    else {
      errEl.textContent = 'Credenciales incorrectas.'; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar al Sistema';
    }
  }, 600);
}

document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function startApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sb-username').textContent = currentUser.name;
  document.getElementById('sb-userrole').textContent = `Nivel ${currentUser.role}`;
  buildNav();
  const defaultView = currentUser.role === '5U' ? 'dashboard' : currentUser.role === 'cliente' ? 'myproject' : 'mytasks';
  navigateTo(defaultView);

  // Load from Supabase if available
  if (SUPABASE_ANON_KEY) loadFromSupabase();
}

async function loadFromSupabase() {
  const rows = await db.query('projects', '?select=*');
  if (rows && rows.length > 0) {
    // Merge basic fields; tasks/updates stay local until full schema is set up
    rows.forEach(r => {
      const p = PROJECTS.find(x => x.id === r.code);
      if (p) { p.progress = r.progress ?? p.progress; p.status = r.status ?? p.status; }
    });
    if (currentView) renderCurrentView();
  }
}

function doLogout() {
  currentUser = null; currentView = 'dashboard';
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('login-email').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Ingresar al Sistema';
}

      ${p.tasks.map(t=>`<div class="card">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:10px;height:10px;border-radius:50%;background:${STATUS_COLORS[t.status]||'var(--goldDim)'};flex-shrink:0"></div>
          <div style="flex:1;font-size:13px;color:var(--text)">${t.name}</div>
          ${badge(t.status)}
        </div>
      </div>`).join('')}
    </div>
    <div style="margin-bottom:16px;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase">Últimas Actualizaciones</div>
    ${p.updates.map(u=>`<div style="display:flex;gap:16px;padding-bottom:14px;border-bottom:1px solid var(--goldBorder);margin-bottom:14px">
      <div style="width:6px;height:6px;border-radius:50%;background:var(--goldDim);margin-top:5px;flex-shrink:0"></div>
      <div>
        <div style="font-size:12px;color:var(--text);margin-bottom:4px">${u.text}</div>
        <div style="font-size:10px;color:var(--textMuted)">${u.date}</div>
      </div>
    </div>`).join('')}
    ${divider()}
    <div style="text-align:center;font-size:10px;color:var(--textMuted);letter-spacing:.1em;font-style:italic">Acompañamiento técnico de obra, de principio a fin</div>`;
}

// ─── EMPLOYEE VIEW ────────────────────────────────────────────────────────────
function renderMyTasks() {
  const myTasks = PROJECTS.flatMap(p =>
    p.tasks.filter(t=>t.level.includes('A')).map(t=>({...t,project:p.name}))
  ).slice(0,3);
  document.getElementById('view-mytasks').innerHTML = `
    <div class="section-super">Mis Tareas</div>
    <div class="section-title">TRABAJO ASIGNADO</div>
    <div class="section-sub">Nivel ${currentUser.role} · ${currentUser.name}</div>
    <div class="col-stack">
      ${myTasks.map(t=>`<div class="card" id="task-card-${t.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div>
            <div style="font-size:14px;color:var(--text);font-weight:700;margin-bottom:4px">${t.name}</div>
            <div style="font-size:11px;color:var(--textMuted)">${t.project}</div>
          </div>
          ${badge(t.status)}
        </div>
        ${divider()}
        <div style="display:flex;gap:10px;align-items:center">
          <span style="font-size:10px;color:${t.photos>0?'var(--goldDim)':'var(--error)'};flex:1">${t.photos>0?`📷 ${t.photos} fotos cargadas`:'⚠ Fotos requeridas'}</span>
          <button class="btn btn-outline" style="font-size:10px;padding:6px 12px" onclick="toggleUpload('${t.id}')">+ Foto</button>
          ${t.status!=='Cerrado'?`<button class="btn btn-primary" style="font-size:10px;padding:6px 12px" onclick="markProgress('${t.id}')">Marcar avance</button>`:''}
        </div>
        <div id="upload-${t.id}" class="upload-zone hidden">
          <div style="font-size:22px;margin-bottom:8px">📷</div>
          <div style="font-size:11px;color:var(--goldDim);margin-bottom:12px">Seleccionar fotografías de avance de obra</div>
          <button class="btn btn-outline" style="font-size:10px">Elegir archivos</button>
        </div>
      </div>`).join('')}
    </div>`;
}

function toggleUpload(id) {
  const el = document.getElementById(`upload-${id}`);
  if (el) el.classList.toggle('hidden');
}

async function markProgress(taskId) {
  // Update locally
  PROJECTS.forEach(p => {
    const t = p.tasks.find(t=>t.id===taskId);
    if (t && t.status==='Haciendo') t.status = 'Revisión';
  });
  // Try Supabase
  if (SUPABASE_ANON_KEY) {
    await db.patch('tasks', taskId, { status: 'Revisión' });
  }
  renderMyTasks();
}
</script>
