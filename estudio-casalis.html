  if (puedeVerNomina) loadNomina(fmt, area, level);
  if (puedeCajas) loadCajas(fmt);
}

// Parámetros de nómina (editables por 5O y 5U)
const NOMINA_PARAMS = {
  sueldosBase: { A: 31840, E: 12000, I: 22000, O: 3500, U: 0 },
  aporteEmpleado: 0.18,  // 11+3+3+1
  aporteEmpresa:  0.44,  // 16+6+5+3+12+2
  participacionU: { '1U':0.06, '2U':0.08, '3U':0.03, '4U':0.05, '5U':0.08 },
};

async function loadNomina(fmt, area, level) {
  const el = document.getElementById('nomina-list');
  if (!el) return;
  const puedeEditarParam = currentUser.role==='5O'||currentUser.role==='5U';
  const puedeCargarSueldo = area==='O'&&level>=3;

  // Ingresos totales para calcular participación U
  const movs = await db.query('movements','?type=eq.ingreso&status=eq.aprobado&select=amount') || [];
  const ingresoTotal = movs.reduce((a,m)=>a+Number(m.amount),0);

  const users = await db.query('users','?select=id,name,role,province&role=neq.cliente&order=role') || [];
  if (!users.length) { el.innerHTML = '<div style="font-size:12px;color:var(--textMuted);text-align:center;padding:16px">Sin empleados</div>'; return; }

  if (!fmt) fmt = n => '$' + Number(n).toLocaleString('es-AR');

  const calcSueldo = (u) => {
    const aArea  = u.role?.[1]||'A';
    const aLevel = parseInt(u.role?.[0])||1;
    const base   = NOMINA_PARAMS.sueldosBase[aArea] || 0;
    let bruto    = base * (1 + (aLevel-1)*0.05);

    if (aArea === 'U') {
      const pct = NOMINA_PARAMS.participacionU[u.role]||0;
      bruto = ingresoTotal * pct;
    }

    const descEmp  = bruto * NOMINA_PARAMS.aporteEmpleado;
    const neto     = bruto - descEmp;
    const costoEmp = bruto * (1 + NOMINA_PARAMS.aporteEmpresa);
    return { bruto, neto, costoEmp, descEmp };
  };

  el.innerHTML = `
    ${puedeEditarParam?`
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:10px">⚙ Parámetros de nómina</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">
        <div><div class="field-label" style="font-size:9px">Base Área A ($)</div><input class="field-input" id="np-A" value="${NOMINA_PARAMS.sueldosBase.A}" style="font-size:11px" onchange="actualizarParam('A',this.value)"/></div>
        <div><div class="field-label" style="font-size:9px">Base Área E ($)</div><input class="field-input" id="np-E" value="${NOMINA_PARAMS.sueldosBase.E}" style="font-size:11px" onchange="actualizarParam('E',this.value)"/></div>
        <div><div class="field-label" style="font-size:9px">Base Área I ($)</div><input class="field-input" id="np-I" value="${NOMINA_PARAMS.sueldosBase.I}" style="font-size:11px" onchange="actualizarParam('I',this.value)"/></div>
        <div><div class="field-label" style="font-size:9px">Base Área O ($)</div><input class="field-input" id="np-O" value="${NOMINA_PARAMS.sueldosBase.O}" style="font-size:11px" onchange="actualizarParam('O',this.value)"/></div>
        <div><div class="field-label" style="font-size:9px">Aporte Empleado %</div><input class="field-input" id="np-ae" value="${NOMINA_PARAMS.aporteEmpleado*100}" style="font-size:11px" onchange="NOMINA_PARAMS.aporteEmpleado=parseFloat(this.value)/100;loadNomina()"/></div>
        <div><div class="field-label" style="font-size:9px">Aporte Empresa %</div><input class="field-input" id="np-emp" value="${NOMINA_PARAMS.aporteEmpresa*100}" style="font-size:11px" onchange="NOMINA_PARAMS.aporteEmpresa=parseFloat(this.value)/100;loadNomina()"/></div>
      </div>
    </div>`:''} 
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:11px">
      <thead>
        <tr style="border-bottom:1px solid var(--goldBorder)">
          <th style="text-align:left;padding:8px 6px;color:var(--goldDim);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.08em">Empleado</th>
          <th style="text-align:left;padding:8px 6px;color:var(--goldDim);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.08em">Rol</th>
          <th style="text-align:right;padding:8px 6px;color:var(--goldDim);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.08em">Bruto</th>
          <th style="text-align:right;padding:8px 6px;color:var(--goldDim);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.08em">Desc.</th>
          <th style="text-align:right;padding:8px 6px;color:var(--success);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.08em">Neto</th>
          <th style="text-align:right;padding:8px 6px;color:var(--error);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.08em">Costo total</th>
          ${puedeCargarSueldo?`<th style="padding:8px 6px"></th>`:''}
        </tr>
      </thead>
      <tbody>
        ${users.map(u=>{
          const s = calcSueldo(u);
          return `<tr style="border-bottom:1px solid var(--bgPanel)">
            <td style="padding:8px 6px;color:var(--text);font-weight:600">${u.name}</td>
            <td style="padding:8px 6px;color:var(--textMuted)">${u.role} · ${u.province||'—'}</td>
            <td style="padding:8px 6px;text-align:right;color:var(--text)">${fmt(s.bruto)}</td>
            <td style="padding:8px 6px;text-align:right;color:var(--error)">-${fmt(s.descEmp)}</td>
            <td style="padding:8px 6px;text-align:right;color:var(--success);font-weight:700">${fmt(s.neto)}</td>
            <td style="padding:8px 6px;text-align:right;color:var(--error)">${fmt(s.costoEmp)}</td>
            ${puedeCargarSueldo?`<td style="padding:8px 6px"><button class="btn btn-ghost" style="font-size:9px;padding:3px 8px" onclick="pagarSueldo('${u.id}','${u.name.replace(/'/g,"\\'")}')">Pagar</button></td>`:''}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>`;
}

function actualizarParam(area, valor) {
  NOMINA_PARAMS.sueldosBase[area] = parseFloat(valor) || 0;
  loadNomina();
}

const CAJAS_DEF = [
  {id:'colchon',   nombre:'Colchón Creciente',       pct:50, color:'var(--gold)',    inv:'Plazo Fijo / Letras',  icon:'🏦'},
  {id:'marketing', nombre:'Marketing y Captación',    pct:20, color:'var(--goldDim)', inv:'Bonos',                icon:'📢'},
  {id:'tech',      nombre:'Herramientas y Tecnología',pct:15, color:'var(--success)', inv:'Acciones / Billeteras',icon:'🛠'},
  {id:'subcon',    nombre:'Subcontratos y MO',        pct:10, color:'var(--warn)',    inv:'Billetera virtual',    icon:'👷'},
  {id:'premios',   nombre:'Premios y Motivación',     pct:5,  color:'var(--error)',   inv:'Bitcoin / Cripto',     icon:'₿'},
];

async function loadCajas(fmt) {
  const el = document.getElementById('cajas-contenido');
  if (!el) return;
  if (!fmt) fmt = n => '$' + Number(n).toLocaleString('es-AR');

  // Cargar saldos desde Supabase
  const rows = await db.query('cajas','?order=caja_id') || [];
  const saldos = {};
  rows.forEach(r => { saldos[r.caja_id] = r; });

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      ${CAJAS_DEF.map(c => {
        const r = saldos[c.id] || {saldo:0,intereses:0};
        const total = Number(r.saldo||0) + Number(r.intereses||0);
        return `<div class="card">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
            <div style="font-size:22px">${c.icon}</div>
            <div>
              <div style="font-size:11px;font-weight:700;color:${c.color}">${c.nombre}</div>
              <div style="font-size:9px;color:var(--textMuted)">${c.pct}% · ${c.inv}</div>
            </div>
          </div>
          <div style="font-size:20px;font-weight:700;color:${c.color};margin-bottom:4px">${fmt(total)}</div>
          ${Number(r.intereses)>0?`<div style="font-size:10px;color:var(--success)">+ ${fmt(r.intereses)} intereses</div>`:''}
          <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
            <input type="number" id="caja-dep-${c.id}" placeholder="Depositar..." class="field-input" style="font-size:10px;padding:4px 8px;width:110px" min="0"/>
            <button class="btn btn-primary" style="font-size:9px;padding:4px 10px" onclick="depositarCaja('${c.id}')">+ Depositar</button>
          </div>
          <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <input type="number" id="caja-int-${c.id}" placeholder="Interés..." class="field-input" style="font-size:10px;padding:4px 8px;width:110px" min="0"/>
            <button class="btn btn-ghost" style="font-size:9px;padding:4px 10px" onclick="registrarInteres('${c.id}')">% Interés</button>
          </div>
          ${total>0?`<div style="margin-top:6px"><button class="btn btn-ghost" style="font-size:9px;padding:3px 8px;color:var(--error)" onclick="retirarCaja('${c.id}')">Retirar</button></div>`:''}
        </div>`;
      }).join('')}
    </div>`;
}

async function depositarCaja(cajaId) {
  const input = document.getElementById('caja-dep-'+cajaId);
  const monto = parseFloat(input?.value);
  if (!monto || monto <= 0) return;
  const rows = await db.query('cajas',`?caja_id=eq.${cajaId}`) || [];
  if (rows.length > 0) {
    const nuevo = Number(rows[0].saldo||0) + monto;
    await db.patch('cajas', rows[0].id, { saldo: nuevo });
  } else {
    await db.insert('cajas', { caja_id: cajaId, saldo: monto, intereses: 0 });
  }
  if (input) input.value = '';
  loadCajas();
}

async function registrarInteres(cajaId) {
  const input = document.getElementById('caja-int-'+cajaId);
  const monto = parseFloat(input?.value);
  if (!monto || monto <= 0) return;
  const rows = await db.query('cajas',`?caja_id=eq.${cajaId}`) || [];
  if (rows.length > 0) {
    const nuevo = Number(rows[0].intereses||0) + monto;
    await db.patch('cajas', rows[0].id, { intereses: nuevo });
  } else {
    await db.insert('cajas', { caja_id: cajaId, saldo: 0, intereses: monto });
  }
  if (input) input.value = '';
  loadCajas();
}

async function retirarCaja(cajaId) {
  const existing = document.getElementById('retiro-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'retiro-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px';
  const c = CAJAS_DEF.find(x=>x.id===cajaId);
  modal.innerHTML = `
    <div style="background:var(--bgCard);border:1px solid var(--goldBorder);border-radius:4px;padding:28px;max-width:380px;width:100%">
      <div style="font-size:13px;font-weight:700;color:var(--gold);margin-bottom:16px">Retirar de ${c?.nombre||cajaId}</div>
      <div class="field" style="margin-bottom:8px"><div class="field-label">Monto a retirar</div><input class="field-input" id="ret-monto" type="number" placeholder="0" min="0"/></div>
      <div class="field" style="margin-bottom:12px"><div class="field-label">Motivo</div><input class="field-input" id="ret-motivo" placeholder="Ej: Pago proveedor BIM"/></div>
      <div id="ret-msg" style="font-size:11px;display:none;margin-bottom:8px"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" style="font-size:11px" onclick="confirmarRetiro('${cajaId}')">Retirar</button>
        <button class="btn btn-ghost" style="font-size:11px" onclick="document.getElementById('retiro-modal').remove()">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function confirmarRetiro(cajaId) {
  const monto  = parseFloat(document.getElementById('ret-monto')?.value);
  const motivo = document.getElementById('ret-motivo')?.value.trim();
  const msg    = document.getElementById('ret-msg');
  if (!monto||monto<=0) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Ingresá un monto válido.'; return; }
  if (!motivo) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Escribí el motivo.'; return; }
  const rows = await db.query('cajas',`?caja_id=eq.${cajaId}`) || [];
  if (rows.length > 0) {
    const actual = Number(rows[0].saldo||0)+Number(rows[0].intereses||0);
    if (monto > actual) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Saldo insuficiente.'; return; }
    const nuevoSaldo = Math.max(0, Number(rows[0].saldo||0) - monto);
    await db.patch('cajas', rows[0].id, { saldo: nuevoSaldo });
    // Registrar como egreso en movimientos
    await db.insert('movements',{ type:'egreso', concept:`Retiro caja — ${motivo}`, amount:monto, category:'otro', status:'aprobado', created_by:currentUser.id });
  }
  document.getElementById('retiro-modal').remove();
  loadCajas();
}


async function submitMovement() {
  const type     = document.getElementById('mov-type').value;
  const amount   = parseFloat(document.getElementById('mov-amount').value);
  const concept  = document.getElementById('mov-concept').value.trim();
  const project  = document.getElementById('mov-project').value;
  const category = document.getElementById('mov-category')?.value || 'otro';
  const msg      = document.getElementById('mov-msg');
  const area     = getArea(currentUser.role);
  const level    = getLevel(currentUser.role);
  if (!amount || !concept) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Completá monto y concepto.'; return; }
  const status = (level >= 3 || area === 'U') ? 'aprobado' : 'pendiente';
  const result = await db.insert('movements', { type, amount, concept, category, project_id: project||null, status, created_by: currentUser.id });
  if (result) {
    msg.style.display='block'; msg.style.color='var(--success)';
    msg.textContent = status==='aprobado' ? '✓ Movimiento registrado.' : '✓ Enviado a autorización.';
    if (status === 'pendiente') {
      // Notificar a 3O, 4O, 5O que hay un movimiento pendiente
      await notifyByArea('O', `Movimiento pendiente de autorización`, `"${concept}" por $${amount.toLocaleString('es-AR')} requiere aprobación.`, 'pago');
    }
    setTimeout(()=>renderFinanzas(), 1200);
  } else { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Error al guardar.'; }
}

async function approveMovement(id) {
  const movs = await db.query('movements', `?id=eq.${id}&select=*`) || [];
  const mov = movs[0];
  await db.patch('movements', id, { status:'aprobado', approved_by: currentUser.id });
  if (mov) {
    await notifyByArea('O', `Movimiento aprobado`, `"${mov.concept}" por $${Number(mov.amount).toLocaleString('es-AR')} fue aprobado.`, 'pago');
  }
  renderFinanzas();
}

async function rejectMovement(id) {
  const movs = await db.query('movements', `?id=eq.${id}&select=*`) || [];
  const mov = movs[0];
  await db.patch('movements', id, { status:'rechazado' });
  if (mov) {
    await notifyByArea('O', `Movimiento rechazado`, `"${mov.concept}" por $${Number(mov.amount).toLocaleString('es-AR')} fue rechazado.`, 'alerta');
  }
  renderFinanzas();
}

// ─── MENSAJES ─────────────────────────────────────────────────────────────────
async function renderMensajes() {
  const el = document.getElementById('view-mensajes');
  if (!el) return;
  const level = getLevel(currentUser.role);

  el.innerHTML = `
    <div class="section-super">Sistema</div>
    <div class="section-title">MENSAJES</div>

    <div class="card" style="margin-bottom:24px">
      <div style="font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px">✉ Nuevo mensaje directo</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <div>
          <div class="field-label" style="font-size:10px;margin-bottom:4px">Destinatario</div>
          <select class="field-input" id="msg-to" style="font-size:11px">
            <option value="">Seleccionar...</option>
          </select>
        </div>
        <div>
          <div class="field-label" style="font-size:10px;margin-bottom:4px">Asunto</div>
          <input class="field-input" id="msg-subject" placeholder="Asunto del mensaje" style="font-size:11px"/>
        </div>
      </div>
      <textarea class="field-input" id="msg-body" placeholder="Escribí tu mensaje..." style="height:80px;resize:none;margin-bottom:8px"></textarea>
      <div id="msg-send-status" style="font-size:11px;display:none;margin-bottom:8px"></div>
      <button class="btn btn-primary" style="font-size:11px" onclick="enviarMensaje()">Enviar mensaje</button>
    </div>

    <div style="font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px">Mensajes recibidos</div>
    <div class="col-stack-xs" id="msg-list">
      <div style="font-size:12px;color:var(--textMuted);padding:20px;text-align:center">Cargando...</div>
    </div>`;

  // Cargar usuarios para el selector
  let users = await db.query('users','?select=id,name,role&order=name') || [];

  // Si es cliente, buscar el responsable de su obra primero
  if (currentUser.role === 'cliente') {
    const p = PROJECTS.find(x=>x.client===currentUser.name);
    if (p) {
      const team = await db.query('project_team',`?project_id=eq.${p.id}&is_lead=eq.true&select=user_id,user_name,user_role`) || [];
      if (team.length > 0) {
        const lead = team[0];
        const select = document.getElementById('msg-to');
        if (select) {
          const opt = document.createElement('option');
          opt.value = lead.user_id;
          opt.textContent = `★ ${lead.user_name} — Responsable de tu obra`;
          opt.selected = true;
          select.appendChild(opt);
        }
      }
    }
    // Clientes solo pueden contactar al responsable de su obra
    users = users.filter(u=>u.role!=='cliente');
  }

  const select = document.getElementById('msg-to');
  if (select) {
    users.filter(u=>u.id !== currentUser.id).forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = `${u.name} — ${ROLE_LABELS[u.role]||u.role}`;
      select.appendChild(opt);
    });
  }

  // Cargar mensajes recibidos
  const msgs = await db.query('notifications', `?user_id=eq.${currentUser.id}&type=eq.mensaje&order=created_at.desc&limit=30`) || [];
  const list = document.getElementById('msg-list');
  if (!list) return;

  if (msgs.length === 0) {
    list.innerHTML = `<div style="font-size:12px;color:var(--textMuted);padding:20px;text-align:center">Sin mensajes recibidos</div>`;
    return;
  }

  list.innerHTML = msgs.map(m => {
    const time = m.created_at ? new Date(m.created_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="card" id="notif-${m.id}" style="opacity:${m.read?'.65':'1'}">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div style="font-size:18px;color:var(--gold);flex-shrink:0">✉</div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <div style="font-size:13px;font-weight:${m.read?'400':'700'};color:${m.read?'var(--textMuted)':'var(--text)'}">${m.title}</div>
            ${!m.read?`<button class="btn btn-ghost" style="font-size:9px;padding:2px 8px" onclick="markNotifRead('${m.id}')">Leído</button>`:''}
          </div>
          <div style="font-size:12px;color:var(--textMuted);margin-bottom:6px;line-height:1.5">${m.body||''}</div>
          <div style="font-size:10px;color:var(--textMuted)">${time}</div>
        </div>
        ${!m.read?`<div style="width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:6px"></div>`:''}
      </div>
    </div>`;
  }).join('');
}

async function enviarMensaje() {
  const toId   = document.getElementById('msg-to').value;
  const subject = document.getElementById('msg-subject').value.trim();
  const body   = document.getElementById('msg-body').value.trim();
  const status = document.getElementById('msg-send-status');

  if (!toId || !subject || !body) { status.style.display='block'; status.style.color='var(--error)'; status.textContent='Completá todos los campos.'; return; }

  status.style.display='block'; status.style.color='var(--goldDim)'; status.textContent='Enviando...';

  const result = await db.insert('notifications', {
    user_id: toId,
    role_target: null,
    title: `✉ ${currentUser.name}: ${subject}`,
    body,
    type: 'mensaje',
    read: false
  });

  if (result) {
    status.style.color='var(--success)'; status.textContent='✓ Mensaje enviado.';
    document.getElementById('msg-subject').value='';
    document.getElementById('msg-body').value='';
    document.getElementById('msg-to').value='';
  } else {
    status.style.color='var(--error)'; status.textContent='Error al enviar.';
  }
}

// ─── PEDIDOS DE MATERIALES ────────────────────────────────────────────────────
async function renderPedidos() {
  const area  = getArea(currentUser.role);
  const level = getLevel(currentUser.role);
  const el    = document.getElementById('view-pedidos');
  if (!el) return;

  const canCreate  = area==='I'&&level>=3;
  const canApprove = (area==='I'&&level>=4)||(area==='O'&&level>=3)||area==='U';
  const canReceive = area==='A'&&level>=3;

  el.innerHTML = `<div class="section-super">Módulo</div><div class="section-title">PEDIDOS DE MATERIALES</div><div style="color:var(--textMuted);font-size:12px;padding:20px;text-align:center">Cargando...</div>`;

  const pedidos = await db.query('pedidos','?order=created_at.desc&limit=50') || [];

  const statusColors = {pendiente:'var(--warn)',aprobado:'var(--success)',rechazado:'var(--error)',recibido:'var(--goldDim)',comprado:'var(--gold)'};

  let html = `<div class="section-super">Módulo</div><div class="section-title">PEDIDOS DE MATERIALES</div>`;

  if (canCreate) {
    html += `<div class="card" style="margin-bottom:24px">
      <div style="font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px">+ Nuevo pedido</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <input class="field-input" id="ped-item" placeholder="Material solicitado"/>
        <input class="field-input" id="ped-qty" placeholder="Cantidad y unidad (ej: 50 bolsas)"/>
        <select class="field-input" id="ped-project">
          <option value="">Obra...</option>
          ${PROJECTS.map(p=>`<option value="${p.id}">${p.id} — ${p.name}</option>`).join('')}
        </select>
        <input class="field-input" id="ped-urgency" placeholder="Urgencia (Alta/Media/Baja)"/>
      </div>
      <textarea class="field-input" id="ped-desc" placeholder="Descripción adicional..." style="height:50px;resize:none;margin-bottom:8px"></textarea>
      <div id="ped-msg" style="font-size:11px;display:none;margin-bottom:8px"></div>
      <button class="btn btn-primary" style="font-size:11px" onclick="crearPedido()">Enviar pedido</button>
    </div>`;
  }

  html += `<div class="col-stack-xs">
    ${pedidos.length===0?`<div style="font-size:12px;color:var(--textMuted);padding:20px;text-align:center">Sin pedidos registrados</div>`:''}
    ${pedidos.map(p=>`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div>
          <div style="font-size:13px;color:var(--text);font-weight:600">${p.item||'Sin descripción'}</div>
          <div style="font-size:10px;color:var(--textMuted)">${p.project_id||'General'} · ${p.quantity||''} · ${p.created_at?new Date(p.created_at).toLocaleDateString('es-AR'):''}</div>
          ${p.description?`<div style="font-size:11px;color:var(--textMuted);margin-top:4px">${p.description}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:11px;font-weight:700;color:${statusColors[p.status]||'var(--goldDim)'};text-transform:uppercase">${p.status||'pendiente'}</div>
          ${p.urgency?`<div style="font-size:9px;color:var(--textMuted)">${p.urgency}</div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${canApprove&&p.status==='pendiente'?`
        <button class="btn btn-primary" style="font-size:10px;padding:5px 10px" onclick="updatePedido('${p.id}','aprobado')">✓ Aprobar</button>
        <button class="btn btn-outline" style="font-size:10px;padding:5px 10px;color:var(--error);border-color:var(--error)" onclick="updatePedido('${p.id}','rechazado')">✕ Rechazar</button>`:''}
        ${canApprove&&p.status==='aprobado'?`<button class="btn btn-outline" style="font-size:10px;padding:5px 10px" onclick="updatePedido('${p.id}','comprado')">Registrar compra</button>`:''}
        ${canReceive&&p.status==='comprado'?`<button class="btn btn-primary" style="font-size:10px;padding:5px 10px" onclick="updatePedido('${p.id}','recibido')">✓ Confirmar recepción</button>`:''}
      </div>
    </div>`).join('')}
  </div>`;

  el.innerHTML = html;
}

async function crearPedido() {
  const item    = document.getElementById('ped-item').value.trim();
  const qty     = document.getElementById('ped-qty').value.trim();
  const project = document.getElementById('ped-project').value;
  const urgency = document.getElementById('ped-urgency').value.trim() || 'Media';
  const desc    = document.getElementById('ped-desc').value.trim();
  const msg     = document.getElementById('ped-msg');
  if (!item||!project) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Completá material y obra.'; return; }
  msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Enviando...';
  const result = await db.insert('pedidos',{item,quantity:qty,project_id:project,urgency,description:desc,status:'pendiente',created_by:currentUser.id});
  if (result) {
    msg.style.color='var(--success)'; msg.textContent='✓ Pedido enviado.';
    await notifyByArea('O','Nuevo pedido de materiales',`${currentUser.name} solicitó: ${item} para ${project}.`,'info');
    setTimeout(()=>renderPedidos(), 1200);
  } else { msg.style.color='var(--error)'; msg.textContent='Error al enviar.'; }
}

async function updatePedido(id, newStatus) {
  await db.patch('pedidos', id, { status: newStatus });
  if (newStatus==='aprobado') await notifyByArea('I','Pedido aprobado',`Tu pedido de materiales fue aprobado.`,'info');
  if (newStatus==='rechazado') await notifyByArea('I','Pedido rechazado',`Tu pedido de materiales fue rechazado.`,'alerta');
  if (newStatus==='recibido') await notifyByArea('I','Materiales recibidos en obra',`Los materiales del pedido fueron confirmados como recibidos.`,'info');
  renderPedidos();
}

async function eliminarMovimiento(id) {
  const existing = document.getElementById('elim-mov-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'elim-mov-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = `
    <div style="background:var(--bgCard);border:1px solid var(--goldBorder);border-radius:4px;padding:28px;max-width:400px;width:100%">
      <div style="font-size:14px;font-weight:700;color:var(--error);margin-bottom:16px">Eliminar movimiento</div>
      <div class="field" style="margin-bottom:12px"><div class="field-label">Motivo (requerido)</div>
        <textarea class="field-input" id="em-motivo" placeholder="Justificá la eliminación..." style="height:70px;resize:none"></textarea>
      </div>
      <div id="em-msg" style="font-size:11px;display:none;margin-bottom:12px"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" style="font-size:11px;color:var(--error);border-color:var(--error)" onclick="confirmarElimMovimiento('${id}')">Eliminar</button>
        <button class="btn btn-ghost" style="font-size:11px" onclick="document.getElementById('elim-mov-modal').remove()">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function confirmarElimMovimiento(id) {
  const motivo = document.getElementById('em-motivo').value.trim();
  const msg    = document.getElementById('em-msg');
  if (!motivo) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Escribí el motivo.'; return; }
  await db.delete('movements', id);
  document.getElementById('elim-mov-modal').remove();
  renderFinanzas();
}

  if (isCEO) {
    const stats = {Pendiente:0,Haciendo:0,Revisión:0,Cerrado:0,Cancelado:0};
    todos.forEach(t=>{ if(stats[t.status]!==undefined) stats[t.status]++; });
    html += `<div class="grid-4" style="margin-bottom:20px">
      <div class="card" style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--warn)">${stats.Pendiente}</div><div style="font-size:10px;color:var(--textMuted)">Pendientes</div></div>
      <div class="card" style="text-align:center"><div style="font-size:22px;font-weight:700;color:var(--goldDim)">${stats.Haciendo}</div><div style="font-size:10px;color:var(--textMuted)">En curso</div></div>

          ${puedeAprobar?`
          <button class="btn btn-primary" style="font-size:10px;padding:5px 10px" onclick="aprobarTrabajo('${t.id}')">✓ Aprobar</button>
          <button class="btn btn-outline" style="font-size:10px;padding:5px 10px;color:var(--error);border-color:var(--error)" onclick="rechazarTrabajo('${t.id}')">✕ Rechazar con observación</button>`:''}
          ${isCreador&&!['Cerrado','Cancelado'].includes(t.status)?`<button class="btn btn-ghost" style="font-size:10px;padding:5px 10px;color:var(--error)" onclick="updateTrabajo('${t.id}','Cancelado')">Cancelar</button>`:''}
          ${isCEO?`<button class="btn btn-ghost" style="font-size:10px;padding:5px 10px;color:var(--error)" onclick="eliminarTrabajo('${t.id}')">✕ Borrar</button>`:''}
        </div>

        <!-- FORM ENTREGA (oculto) -->
        <div id="entrega-form-${t.id}" class="hidden" style="margin-top:12px;padding:12px;background:var(--bgPanel);border-radius:2px">
          <div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:10px">📤 Entregar trabajo</div>
          <textarea class="field-input" id="ent-obs-${t.id}" placeholder="Observaciones sobre la entrega..." style="height:60px;resize:none;margin-bottom:8px"></textarea>
          <input type="file" id="ent-file-${t.id}" style="color:var(--textMuted);font-size:11px;width:100%;margin-bottom:8px"/>
          <div id="ent-msg-${t.id}" style="font-size:11px;display:none;margin-bottom:8px"></div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-primary" style="font-size:10px" onclick="enviarEntrega('${t.id}')">Enviar entrega</button>
            <button class="btn btn-ghost" style="font-size:10px" onclick="document.getElementById('entrega-form-${t.id}').classList.add('hidden')">Cancelar</button>
          </div>
        </div>
      </div>`;
    }
  }

  html += `</div>`;
  el.innerHTML = html;
}

function abrirEntrega(trabajoId) {
  const form = document.getElementById('entrega-form-'+trabajoId);
  if (form) form.classList.toggle('hidden');
}

async function enviarEntrega(trabajoId) {
  const obs  = document.getElementById('ent-obs-'+trabajoId)?.value.trim();
  const file = document.getElementById('ent-file-'+trabajoId)?.files?.[0];
  const msg  = document.getElementById('ent-msg-'+trabajoId);

  if (!obs && !file) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Agregá una observación o un archivo.'; return; }
  msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Subiendo...';

  let fileUrl = null;
  if (file) {
    fileUrl = await uploadFileToStorage(file, `trabajos/${trabajoId}`);
    if (!fileUrl) { msg.style.color='var(--error)'; msg.textContent='Error al subir el archivo.'; return; }
  }

  const result = await db.insert('trabajo_entregas',{ trabajo_id:trabajoId, user_id:currentUser.id, observation:obs||'', file_url:fileUrl, feedback:null });
  if (result) {
    await db.patch('trabajos', trabajoId, { status:'Revisión' });
    // Notificar al creador
    const t = await db.query('trabajos',`?id=eq.${trabajoId}&select=created_by,title`) || [];
    if (t.length>0) await sendNotification(t[0].created_by, null, `Trabajo entregado — ${t[0].title}`, `${currentUser.name} entregó el trabajo para tu revisión.`, 'avance');
    msg.style.color='var(--success)'; msg.textContent='✓ Entrega enviada.';
    setTimeout(()=>renderTrabajos(), 1200);
  } else { msg.style.color='var(--error)'; msg.textContent='Error al guardar.'; }
}

async function aprobarTrabajo(trabajoId) {
  await db.patch('trabajos', trabajoId, { status:'Cerrado' });
  const t = await db.query('trabajos',`?id=eq.${trabajoId}&select=assigned_to,title`) || [];
  if (t.length>0&&t[0].assigned_to) await sendNotification(t[0].assigned_to, null, `✓ Trabajo aprobado — ${t[0].title}`, 'Tu entrega fue aprobada.', 'avance');
  renderTrabajos();
}

async function rechazarTrabajo(trabajoId) {
  const ex = document.getElementById('rechazo-trj-modal');
  if (ex) ex.remove();
  const m = document.createElement('div');
  m.id = 'rechazo-trj-modal';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  m.innerHTML = `<div style="background:var(--bgCard);border:1px solid var(--goldBorder);border-radius:4px;padding:28px;max-width:420px;width:100%">
    <div style="font-size:13px;font-weight:700;color:var(--error);margin-bottom:16px">✕ Rechazar entrega</div>
    <div class="field" style="margin-bottom:12px"><div class="field-label">Observación para el asignado</div>
      <textarea class="field-input" id="rtj-obs" placeholder="Describí qué necesita corregirse..." style="height:80px;resize:none"></textarea>
    </div>
    <div id="rtj-msg" style="font-size:11px;display:none;margin-bottom:8px"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" style="font-size:11px;color:var(--error);border-color:var(--error)" onclick="confirmarRechazoTrabajo('${trabajoId}')">Rechazar</button>
      <button class="btn btn-ghost" style="font-size:11px" onclick="document.getElementById('rechazo-trj-modal').remove()">Cancelar</button>
    </div>
  </div>`;
  document.body.appendChild(m);
}

async function confirmarRechazoTrabajo(trabajoId) {
  const obs = document.getElementById('rtj-obs')?.value.trim();
  const msg = document.getElementById('rtj-msg');
  if (!obs) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Escribí la observación.'; return; }

  // Guardar feedback en la última entrega
  const entregas = await db.query('trabajo_entregas',`?trabajo_id=eq.${trabajoId}&order=created_at.desc&limit=1`) || [];
  if (entregas.length>0) await db.patch('trabajo_entregas', entregas[0].id, { feedback: obs });

  await db.patch('trabajos', trabajoId, { status:'Haciendo' });
  const t = await db.query('trabajos',`?id=eq.${trabajoId}&select=assigned_to,title`) || [];
  if (t.length>0&&t[0].assigned_to) await sendNotification(t[0].assigned_to, null, `✕ Entrega rechazada — ${t[0].title}`, `Observación: ${obs}`, 'alerta');

  document.getElementById('rechazo-trj-modal').remove();
  renderTrabajos();
}

async function crearTrabajo() {
  const title    = document.getElementById('trj-title').value.trim();
  const assignTo = document.getElementById('trj-assign').value;
  const priority = document.getElementById('trj-priority').value;
  const desc     = document.getElementById('trj-desc').value.trim();
  const file     = document.getElementById('trj-file')?.files?.[0];
  const msg      = document.getElementById('trj-msg');
  if (!title) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Ingresá el título.'; return; }
  msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Creando...';

  let fileUrl = null;
  if (file) { fileUrl = await uploadFileToStorage(file, 'trabajos/inicial'); }

  const result = await db.insert('trabajos',{ title, description:desc, priority, status:'Pendiente', assigned_to:assignTo||null, created_by:currentUser.id, initial_file:fileUrl });
  if (result) {
    msg.style.color='var(--success)'; msg.textContent='✓ Trabajo creado.';
    if (assignTo) await sendNotification(assignTo, null, `Nuevo trabajo asignado — ${title}`, `${currentUser.name} te asignó: "${title}". ${desc?'Descripción: '+desc:''}`, 'info');
    setTimeout(()=>renderTrabajos(), 1000);
  } else { msg.style.color='var(--error)'; msg.textContent='Error al crear.'; }
}

async function updateTrabajo(id, status) {
  await db.patch('trabajos', id, { status });
  renderTrabajos();
}

async function eliminarTrabajo(id) {
  confirmarAccion('¿Eliminar este trabajo?', async () => {
    await db.delete('trabajos', id);
    renderTrabajos();
  });
}

function filtrarTrabajos(status) {
  const items = document.querySelectorAll('.trj-item');
  items.forEach(el => {
    if (status==='Todos'||el.dataset.status===status) el.style.display='';
    else el.style.display='none';
  });
}

// ─── LOG DE AUDITORÍA ─────────────────────────────────────────────────────────
async function renderAuditoria() {
  const el = document.getElementById('view-auditoria');
  if (!el) return;
  el.innerHTML = `<div class="section-super">Sistema</div><div class="section-title">LOG DE AUDITORÍA</div><div style="color:var(--textMuted);font-size:12px;padding:20px;text-align:center">Cargando...</div>`;

  // Combinar notificaciones, movimientos, cambios de estado en un log unificado
  const [notifs, movs, pedidos] = await Promise.all([
    db.query('notifications','?order=created_at.desc&limit=50') || [],
    db.query('movements','?order=created_at.desc&limit=50') || [],
    db.query('pedidos','?order=created_at.desc&limit=30') || [],
  ]);

  const fmt = n => '$'+Number(n).toLocaleString('es-AR');

  // Construir log unificado
  const log = [
    ...(notifs||[]).map(n=>({ ts:n.created_at, tipo:'notif', icon:'◉', color:'var(--goldDim)', desc:n.title, detail:n.body||'', user:n.role_target||'' })),
    ...(movs||[]).map(m=>({ ts:m.created_at, tipo:'movimiento', icon:m.type==='ingreso'?'↑':'↓', color:m.type==='ingreso'?'var(--success)':'var(--error)', desc:`${m.type==='ingreso'?'Ingreso':'Egreso'} — ${m.concept}`, detail:`${fmt(m.amount)} · ${m.status||''} · ${m.category||''}`, user:'' })),
    ...(pedidos||[]).map(p=>({ ts:p.created_at, tipo:'pedido', icon:'📦', color:'var(--warn)', desc:`Pedido — ${p.item||''}`, detail:`${p.quantity||''} · ${p.project_id||''} · ${p.status||''}`, user:'' })),
  ].sort((a,b)=>new Date(b.ts)-new Date(a.ts)).slice(0,100);

  // Filtros
  el.innerHTML = `
    <div class="section-super">Sistema · CEO</div>
    <div class="section-title">LOG DE AUDITORÍA</div>
    <div class="section-sub">Historial completo de acciones del sistema</div>

    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      ${['Todo','Movimientos','Notificaciones','Pedidos'].map(f=>`
      <button class="btn btn-ghost" style="font-size:10px;padding:5px 12px" onclick="filtrarAudit('${f.toLowerCase()}')">${f}</button>`).join('')}
    </div>

    <div class="col-stack-xs" id="audit-list">
      ${log.length===0?`<div style="font-size:12px;color:var(--textMuted);padding:20px;text-align:center">Sin registros</div>`:''}
      ${log.map(e=>{
        const time = e.ts ? new Date(e.ts).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
        return `<div class="card audit-row" data-tipo="${e.tipo}" style="display:flex;gap:12px;align-items:flex-start">
          <div style="font-size:18px;color:${e.color};flex-shrink:0;margin-top:2px">${e.icon}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;color:var(--text);font-weight:600;margin-bottom:2px">${e.desc}</div>
            ${e.detail?`<div style="font-size:11px;color:var(--textMuted);margin-bottom:2px">${e.detail}</div>`:''}
            <div style="font-size:10px;color:var(--textMuted)">${time}${e.user?' · '+e.user:''}</div>
          </div>
          <div style="font-size:9px;color:var(--textMuted);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0">${e.tipo}</div>
        </div>`;
      }).join('')}
    </div>`;
}

function filtrarAudit(tipo) {
  document.querySelectorAll('.audit-row').forEach(el=>{
    if (tipo==='todo'||el.dataset.tipo===tipo) el.style.display='';
    else el.style.display='none';
  });
}

function toggleUpload(id) {
  const el = document.getElementById(`upload-${id}`);
  if (el) el.classList.toggle('hidden');
}

async function markProgress(taskId) {
  await changeTaskStatus(taskId, 'Revisión', 'view-mytasks');
}
</script>
