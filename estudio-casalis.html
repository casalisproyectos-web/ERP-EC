<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Estudio Casalis · Gestión de Obras</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1A1209;
    --bgCard: #231A0E;
    --bgPanel: #2D2010;
    --gold: #D9C49D;
    --goldBright: #E8D5A8;
    --goldDim: #A89060;
    --goldFaint: rgba(217,196,157,0.12);
    --goldBorder: rgba(217,196,157,0.25);
    --text: #F0E6CC;
    --textMuted: #8A7A60;
    --error: #C0614A;
    --success: #7A9A6A;
    --warn: #B8882A;
  }
  body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LAYOUT ── */
  #app { display: flex; min-height: 100vh; }
  #sidebar {
    width: 220px; min-height: 100vh; background: var(--bgCard);
    border-right: 1px solid var(--goldBorder); display: flex;
    flex-direction: column; flex-shrink: 0;
  }
  #main { flex: 1; overflow-y: auto; max-height: 100vh; }

  /* ── SIDEBAR ── */
  .sb-header { padding: 24px 20px; border-bottom: 1px solid var(--goldBorder); display: flex; align-items: center; gap: 12px; }
  .sb-brand-name { font-size: 11px; font-weight: 700; letter-spacing: .15em; color: var(--gold); text-transform: uppercase; }
  .sb-brand-sub { font-size: 9px; color: var(--goldDim); letter-spacing: .1em; }
  .sb-user { padding: 16px 20px; border-bottom: 1px solid var(--goldBorder); }
  .sb-user-name { font-size: 12px; color: var(--text); font-weight: 600; }
  .sb-user-role { font-size: 10px; color: var(--goldDim); letter-spacing: .1em; text-transform: uppercase; margin-top: 2px; }
  nav { flex: 1; padding: 12px 0; }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 11px 20px;
    cursor: pointer; font-size: 12px; font-weight: 400; letter-spacing: .05em;
    color: var(--textMuted); border-left: 2px solid transparent; transition: all .15s;
  }
  .nav-item.active { background: var(--goldFaint); border-left-color: var(--gold); color: var(--gold); font-weight: 600; }
  .nav-item:hover:not(.active) { color: var(--goldDim); }
  .nav-icon { font-size: 14px; opacity: .8; }
  .sb-footer { padding: 16px 20px; border-top: 1px solid var(--goldBorder); }
  .logout-btn { font-size: 11px; color: var(--textMuted); cursor: pointer; letter-spacing: .08em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .logout-btn:hover { color: var(--gold); }

  /* ── CARDS ── */
  .card {
    background: var(--bgCard); border: 1px solid var(--goldBorder); border-radius: 4px;
    padding: 20px; transition: border-color .2s, box-shadow .2s;
  }
  .card.clickable { cursor: pointer; }
  .card.clickable:hover { border-color: var(--goldDim); box-shadow: 0 4px 24px rgba(217,196,157,.08); }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase; padding: 10px 20px;
    border: none; border-radius: 2px; cursor: pointer; transition: all .2s;
  }
  .btn-primary { background: var(--gold); color: var(--bg); }
  .btn-primary:hover { background: var(--goldBright); }
  .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
  .btn-outline:hover { color: var(--goldBright); border-color: var(--goldBright); }
  .btn-ghost { background: transparent; color: var(--goldDim); border: 1px solid transparent; }
  .btn-ghost:hover { background: var(--goldFaint); color: var(--goldBright); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── INPUTS ── */
  .field { margin-bottom: 16px; }
  .field-label { font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--goldDim); margin-bottom: 6px; }
  .field-input {
    width: 100%; background: var(--bgPanel); border: 1px solid var(--goldBorder);
    color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 14px;
    padding: 10px 14px; border-radius: 2px; outline: none; transition: border-color .2s;
  }
  .field-input:focus { border-color: var(--gold); }

  /* ── BADGES ── */
  .badge {
    font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 2px; border: 1px solid currentColor; display: inline-block;
  }

  /* ── PROGRESS ── */
  .progress-track { background: var(--goldFaint); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--goldDim), var(--goldBright));
    transition: width .8s cubic-bezier(.4,0,.2,1);
  }

  /* ── DIVIDER ── */
  .gold-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
  .gold-divider::before, .gold-divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--goldBorder));
  }
  .gold-divider::after { background: linear-gradient(90deg, var(--goldBorder), transparent); }
  .gold-divider-diamond { width: 4px; height: 4px; background: var(--goldDim); transform: rotate(45deg); }

  /* ── ORNAMENTAL BORDER ── */
  .ornamental { position: relative; }
  .ornamental-inner { position: relative; z-index: 1; }
  .corner { position: absolute; width: 24px; height: 24px; z-index: 2; }
  .corner.tl { top: 8px; left: 8px; }
  .corner.tr { top: 8px; right: 8px; }
  .corner.bl { bottom: 8px; left: 8px; }
  .corner.br { bottom: 8px; right: 8px; }
  .orn-line-top, .orn-line-bottom { position: absolute; left: 16px; right: 16px; height: 1px; background: linear-gradient(90deg, transparent, var(--goldBorder), transparent); }
  .orn-line-top { top: 16px; }
  .orn-line-bottom { bottom: 16px; }
  .orn-line-left, .orn-line-right { position: absolute; top: 16px; bottom: 16px; width: 1px; background: linear-gradient(180deg, transparent, var(--goldBorder), transparent); }
  .orn-line-left { left: 16px; }
  .orn-line-right { right: 16px; }

  /* ── SECTION HEADERS ── */
  .section-super { letter-spacing: .2em; font-size: 10px; color: var(--goldDim); text-transform: uppercase; margin-bottom: 8px; }
  .section-title { font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: .05em; margin-bottom: 4px; }
  .section-sub { font-size: 11px; color: var(--textMuted); margin-bottom: 28px; }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, rgba(217,196,157,.06) 0%, transparent 70%);
  }
  #login-box { width: 380px; }
  #login-box-inner { padding: 48px 40px; text-align: center; }
  .login-brand { margin-top: 20px; letter-spacing: .35em; font-size: 13px; font-weight: 700; color: var(--gold); text-transform: uppercase; }
  .login-brand-sub { letter-spacing: .15em; font-size: 10px; color: var(--goldDim); text-transform: uppercase; margin-top: 4px; margin-bottom: 8px; }

  /* ── VIEWS ── */
  .view { padding: 32px; }
  .hidden { display: none !important; }

  /* ── GRID HELPERS ── */
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .col-stack { display: flex; flex-direction: column; gap: 16px; }
  .col-stack-sm { display: flex; flex-direction: column; gap: 8px; }
  .col-stack-xs { display: flex; flex-direction: column; gap: 10px; }

  /* ── TABS ── */
  .tabs { display: flex; border-bottom: 1px solid var(--goldBorder); margin-bottom: 20px; }
  .tab {
    padding: 10px 20px; cursor: pointer; font-size: 11px; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase; color: var(--textMuted);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── KPI CARD ── */
  .kpi-icon { font-size: 22px; margin-bottom: 8px; }
  .kpi-value { font-size: 28px; font-weight: 700; line-height: 1; }
  .kpi-label { font-size: 10px; color: var(--textMuted); letter-spacing: .08em; text-transform: uppercase; margin-top: 6px; }

  /* ── UPLOAD MOCK ── */
  .upload-zone {
    margin-top: 12px; padding: 16px; background: var(--bgPanel);
    border: 1px dashed var(--goldBorder); border-radius: 2px; text-align: center;
  }

  /* ── NOTIF ── */
  .notif-row { display: flex; align-items: center; gap: 16px; }
  .notif-icon { font-size: 18px; width: 24px; text-align: center; }
  .notif-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }

  /* ── SUPABASE STATUS ── */
  #supabase-status { position: fixed; bottom: 16px; right: 16px; font-size: 10px; letter-spacing: .08em; text-transform: uppercase; padding: 6px 12px; border-radius: 2px; z-index: 999; }
  #supabase-status.connecting { color: var(--warn); border: 1px solid var(--warn); background: rgba(184,136,42,.1); }
  #supabase-status.connected { color: var(--success); border: 1px solid var(--success); background: rgba(122,154,106,.1); }
  #supabase-status.error { color: var(--error); border: 1px solid var(--error); background: rgba(192,97,74,.1); }

  @media (max-width: 768px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }
    .grid-auto { grid-template-columns: repeat(2, 1fr); }
    #sidebar {
      position: fixed; left: -240px; top: 0; bottom: 0;
      width: 240px; z-index: 1000;
      transition: left .25s ease;
    }
    #sidebar.open { left: 0; box-shadow: 4px 0 20px rgba(0,0,0,.6); }
    #main { max-height: 100vh; padding-bottom: 60px; }
    .view { padding: 16px !important; }
    #mobile-menu-btn {
      display: flex !important;
    }
    #mobile-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 999;
    }
    #mobile-overlay.show { display: block; }
    .card { padding: 14px; }
    .section-title { font-size: 20px !important; }
    .grid-4 { gap: 8px; }
    .grid-3 { gap: 8px; }
    table { font-size: 10px; }
  }
  @media (min-width: 769px) {
    #mobile-menu-btn { display: none !important; }
    #mobile-overlay { display: none !important; }
  }
</style>
</head>

<script>
// ─── SUPABASE CONFIG ───────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://aorzucbtbqofiegvmzsb.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFvcnp1Y2J0YnFvZmllZ3ZtenNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDA3NzUsImV4cCI6MjA5Mjg3Njc3NX0.1VWOFvOWz7lqC-KPo4Or-s43l4yoJuhgIEC10pPlpmc'; // ← Pegá acá tu anon key de Supabase

// ─── SUPABASE CLIENT (lightweight, sin SDK) ────────────────────────────────────
const db = {
  async query(table, params = '') {
    if (!SUPABASE_ANON_KEY) return null;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        }
      });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    } catch(e) { console.warn('Supabase:', e); return null; }
  },
  async insert(table, data) {
    if (!SUPABASE_ANON_KEY) return null;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    } catch(e) { console.warn('Supabase insert:', e); return null; }
  },
  async patch(table, id, data) {
    if (!SUPABASE_ANON_KEY) return null;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=representation'
        },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error(await res.text());
      return await res.json();
    } catch(e) { console.warn('Supabase patch:', e); return null; }
  },
  async delete(table, id) {
    if (!SUPABASE_ANON_KEY) return null;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
        method: 'DELETE',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        }
      });
      if (!res.ok) throw new Error(await res.text());
      return true;
    } catch(e) { console.warn('Supabase delete:', e); return null; }
  }
};

async function checkSupabase() {
  const el = document.getElementById('supabase-status');
  if (!SUPABASE_ANON_KEY) {
    el.textContent = '⚠ Supabase: sin clave API'; el.className = 'connecting';
    return;
  }
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/users?select=id&limit=1`, { headers: { 'apikey': SUPABASE_ANON_KEY } });
    if (r.ok || r.status === 200) { el.textContent = '⬡ Supabase conectado'; el.className = 'connected'; }
    else throw new Error();
  } catch { el.textContent = '✕ Supabase error'; el.className = 'error'; }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');

  btn.disabled = true; btn.textContent = 'Accediendo…'; errEl.style.display = 'none';

  // Try Supabase first
  if (SUPABASE_ANON_KEY) {
    const rows = await db.query('users', `?email=eq.${encodeURIComponent(email)}&select=*`);
    if (rows && rows.length > 0 && rows[0].password === pass) {
      const u = rows[0];
      currentUser = { id:u.id, name:u.name, role:u.role, email:u.email };
      startApp(); return;
    }
  }

  // Fallback: solo cuenta CEO local si Supabase falla
  setTimeout(() => {
    const u = USERS[email];
    if (u && u.pass === pass) {
      currentUser = { id: 'local-5u', name: u.name, role: u.role, email: u.email };
      startApp();
    } else {
      errEl.textContent = 'Credenciales incorrectas o sin conexión.'; errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar al Sistema';
    }
  }, 600);
}

  try {

    const team = await db.query('users', '?select=id,name,role,province&role=neq.cliente');

    if (projects && projects.length > 0) {
      PROJECTS = projects.map(p => ({

        status: p.status || 'activa',

        province: p.province || '',
        tasks: tasks ? tasks.filter(t => t.project_id === p.id).map(t => ({
          id: t.id,
          name: t.name,
          status: t.status || 'Pendiente',
          level: t.level || '',
          weight: t.weight || 0,
          photos: t.photos || 0
        })) : [],

      }));

    if (team && team.length > 0) {

// ─── ROLES Y PERMISOS ─────────────────────────────────────────────────────────
const ROLE_LABELS = {
  '1A':'Ayudante','2A':'Oficial','3A':'Capataz','4A':'Supervisor de Campo','5A':'Jefe de Ejecución',
  '1E':'Auxiliar de CAD','2E':'Cadista Jr.','3E':'Proyectista','4E':'Modelador BIM','5E':'Director de Proyecto',
  '1I':'Pasante','2I':'Residente Jr.','3I':'Arquitecto de Obra','4I':'Jefe de DO','5I':'Director de Obras',
  '1O':'Auxiliar Administrativo','2O':'Asistente Administrativo','3O':'Analista Administrativo','4O':'COO','5O':'CFO',
  '1U':'Director Local','2U':'Director Regional','3U':'Consultor','4U':'Estratega Operativo','5U':'CEO',
  'cliente':'Cliente'
};

const AREA_LABELS = {
  'A':'Mano de Obra','E':'Dibujo Técnico','I':'Dirección de Obra','O':'Administración','U':'Gobierno'
};

function getArea(role) { return role && role.length === 2 ? role[1] : null; }
function getLevel(role) { return role && role.length === 2 ? parseInt(role[0]) : 0; }

function canDo(action) {
  const role = currentUser?.role;
  const area = getArea(role);
  const level = getLevel(role);
  switch(action) {
    case 'ver_todas_obras':    return area === 'U' || area === 'I' && level >= 4 || area === 'O' && level >= 3;
    case 'crear_cuenta':       return area === 'U' && level >= 5 || area === 'O' && level >= 2;
    case 'modificar_roles':    return area === 'U' && level >= 5 || area === 'O' && level >= 3;
    case 'asignar_tareas':     return area === 'U' && level >= 4 || area === 'I' && level >= 3;
    case 'aprobar_avances':    return area === 'I' || area === 'U';
    case 'ver_finanzas':       return area === 'O' || area === 'U' || (area === 'I' && level >= 4);
    case 'ver_equipo':         return area === 'U' || area === 'I' || area === 'A' && level >= 4 || area === 'O' && level >= 3;
    case 'aprobar_planos':     return area === 'E' && level >= 4 || area === 'I' || area === 'U';
    case 'ver_panel_global':   return area === 'U';
    case 'ver_config':         return area === 'U' && level >= 4;
    default: return false;
  }
}

async function renderDashboard() {
  const area  = getArea(currentUser.role);
  const level = getLevel(currentUser.role);
  const el    = document.getElementById('view-dashboard');
  el.innerHTML = `<div class="section-super">Panel</div><div class="section-title">Cargando...</div>`;

  // Filtrar proyectos según rol
  let myProjects = PROJECTS;
  if (area==='U'&&level===1) myProjects = PROJECTS.filter(p=>p.province===currentUser.province);
  else if (area==='U'&&level===2) myProjects = PROJECTS.filter(p=>p.region===currentUser.region);
  else if (area==='I'&&level<=3) {
    const myTeam = await db.query('project_team',`?user_id=eq.${currentUser.id}&select=project_id`) || [];
    const ids = myTeam.map(t=>t.project_id);
    myProjects = ids.length>0 ? PROJECTS.filter(p=>ids.includes(p.id)) : PROJECTS;
  }

  // Solo obras vigentes (no finalizadas ni canceladas)
  const vigentes = myProjects.filter(p=>!['finalizada','cancelada'].includes(p.status));
  const allT    = vigentes.flatMap(p=>p.tasks.filter(t=>t.status!=='Cerrado'));
  const active  = vigentes.filter(p=>p.status==='activa').length;
  const paused  = vigentes.filter(p=>p.status==='pausada').length;
  const inProg  = allT.filter(t=>t.status==='Haciendo').length;
  const pending = allT.filter(t=>t.status==='Pendiente').length;
  const review  = allT.filter(t=>t.status==='Revisión').length;

    const movs = await db.query('movements','?status=neq.rechazado&order=created_at.desc&limit=100') || [];

      <div class="card"><div class="kpi-icon" style="color:var(--error)">↓</div><div class="kpi-value" style="color:var(--error);font-size:18px">${fmt(egr)}</div><div class="kpi-label">Egresos</div></div>
      <div class="card"><div class="kpi-icon" style="color:var(--gold)">◈</div><div class="kpi-value" style="color:var(--gold);font-size:18px">${fmt(ing-egr)}</div><div class="kpi-label">Saldo</div></div>
    </div>`;
  }

  // Alertas pendientes
  const alerts = await db.query('notifications',`?user_id=eq.${currentUser.id}&read=eq.false&select=id`) || [];

  el.innerHTML = `
    <div class="section-super">Panel · ${ROLE_LABELS[currentUser.role]||currentUser.role}</div>
    <div class="section-title">RESUMEN OPERATIVO</div>
    <div class="section-sub">${currentUser.name} · ${currentUser.province||''}</div>

    <div class="grid-4" style="margin-bottom:28px">
      <div class="card"><div class="kpi-icon" style="color:var(--success)">⬡</div><div class="kpi-value" style="color:var(--success)">${active}</div><div class="kpi-label">Obras Activas</div></div>
      <div class="card"><div class="kpi-icon" style="color:var(--warn)">◌</div><div class="kpi-value" style="color:var(--warn)">${paused}</div><div class="kpi-label">Obras Pausadas</div></div>
      <div class="card"><div class="kpi-icon" style="color:var(--goldBright)">◇</div><div class="kpi-value" style="color:var(--goldBright)">${inProg}</div><div class="kpi-label">En Curso</div></div>
      <div class="card" onclick="navigateTo('notifications')" style="cursor:pointer"><div class="kpi-icon" style="color:${alerts.length>0?'var(--error)':'var(--textMuted)'}">◉</div><div class="kpi-value" style="color:${alerts.length>0?'var(--error)':'var(--textMuted)'}">${alerts.length}</div><div class="kpi-label">Alertas</div></div>
    </div>

      <div style="font-size:12px;color:var(--warn);font-weight:700">⏳ ${review} etapa${review!==1?'s':''} esperando revisión</div>

function toggleFormProyecto() {

async function crearProyecto() {
  const name     = document.getElementById('proj-name').value.trim();
  const client   = document.getElementById('proj-client').value;
  const budget   = parseFloat(document.getElementById('proj-budget').value) || 0;
  const province = document.getElementById('proj-province').value;
  const start    = document.getElementById('proj-start').value;
  const desc     = document.getElementById('proj-desc').value.trim();
  const msg      = document.getElementById('proj-msg');

  const REGION_MAP = {'Catamarca':'Norte','Jujuy':'Norte','Salta':'Norte','Santiago del Estero':'Norte','Chaco':'Norte','Formosa':'Norte','Misiones':'Norte','Corrientes':'Norte','Tucumán':'Norte','Córdoba':'Centro','La Rioja':'Centro','San Luis':'Centro','Mendoza':'Centro','San Juan':'Centro','Santa Fe':'Centro','Entre Ríos':'Centro','Buenos Aires':'Sur','La Pampa':'Sur','Neuquén':'Sur','Río Negro':'Sur','Chubut':'Sur','Santa Cruz':'Sur','Tierra del Fuego':'Sur'};

  if (!name || !client) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Completá nombre y cliente.'; return; }

  // Generar ID automático OB-XXX
  const existing = await db.query('projects','?select=id&order=id.desc&limit=1') || [];
  let nextNum = 1;
  if (existing.length > 0) {
    const lastId = existing[0].id; // OB-001
    const lastNum = parseInt(lastId.replace('OB-','')) || 0;
    nextNum = lastNum + 1;
  }
  const newId = 'OB-' + String(nextNum).padStart(3,'0');
  const region = REGION_MAP[province] || 'Centro';

  msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Creando obra...';

  const result = await db.insert('projects', {
    id: newId, name, client, status: 'borrador',
    progress: 0, zone: region, province, region,
    budget, description: desc, start_date: start || null
  });

  if (result) {
    msg.style.color='var(--success)'; msg.textContent=`✓ Obra ${newId} creada como Borrador.`;
    // Agregar localmente
    PROJECTS.push({ id:newId, name, client, status:'borrador', progress:0, zone:region, province, region, budget, tasks:[], updates:[] });
    setTimeout(()=>renderProjects(), 1200);
  } else {
    msg.style.color='var(--error)'; msg.textContent='Error al crear la obra.';
  }
}

function openProject(id) { 
  projectDetailId = id; 
  currentView = 'projects';
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === 'projects');
  });
  document.querySelectorAll('#main > div').forEach(el => el.classList.add('hidden'));
  const el = document.getElementById('view-projects');
  if (el) { el.classList.remove('hidden'); renderProjectDetail(); }
}

async function cambiarEstadoObra(projectId, newStatus) {
  const p = PROJECTS.find(x=>x.id===projectId);
  if (!p) return;
  p.status = newStatus;
  await db.patch('projects', projectId, { status: newStatus });

  // Notificaciones según estado
  const msgs = {
    activa:      { title: `Obra activada — ${p.name}`, body: `La obra "${p.name}" fue activada y está en curso.`, type: 'info' },
    pausada:     { title: `Obra pausada — ${p.name}`, body: `La obra "${p.name}" fue pausada temporalmente.`, type: 'alerta' },
    finalizada:  { title: `Obra finalizada — ${p.name}`, body: `La obra "${p.name}" fue marcada como finalizada.`, type: 'avance' },
    cancelada:   { title: `Obra cancelada — ${p.name}`, body: `La obra "${p.name}" fue cancelada.`, type: 'alerta' },
  };
  const n = msgs[newStatus];
  if (n) {
    await notifyProjectTeam(projectId, n.title, n.body, n.type);
    await notifyClient(projectId, n.title, `Actualización de tu obra: ${n.body}`, n.type);
  }
}

async function eliminarObra(projectId) {
  confirmarAccion('¿Eliminar esta obra? Esta acción no se puede deshacer.', async () => {
    await db.delete('projects', projectId);
    PROJECTS = PROJECTS.filter(p=>p.id!==projectId);
    backToProjects();
  });
}

async function crearTarea(projectId) {
  const name   = document.getElementById('task-name').value.trim();
  const level  = document.getElementById('task-level').value;
  const weight = parseInt(document.getElementById('task-weight').value) || 0;
  const msg    = document.getElementById('task-msg');
  if (!name || !level) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Completá nombre y área.'; return; }

  const existing = await db.query('tasks',`?project_id=eq.${projectId}&select=id&order=id.desc&limit=1`) || [];
  let nextNum = 1;
  if (existing.length > 0) {
    const lastNum = parseInt(existing[0].id.replace('T-','')) || 0;
    nextNum = lastNum + 1;
  } else {
    const allTasks = await db.query('tasks','?select=id&order=id.desc&limit=1') || [];
    if (allTasks.length > 0) nextNum = parseInt(allTasks[0].id.replace('T-','')) + 1;
  }
  const newId = 'T-' + String(nextNum).padStart(3,'0');

  msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Creando etapa...';
  const result = await db.insert('tasks',{id:newId, project_id:projectId, name, level, weight, status:'Pendiente', photos:0});
  if (result) {
    msg.style.color='var(--success)'; msg.textContent=`✓ Etapa ${newId} creada.`;
    const p = PROJECTS.find(x=>x.id===projectId);
    if (p) p.tasks.push({id:newId, name, level, weight, status:'Pendiente', photos:0});
    // Notificar al área asignada
    const area = level[1];
    if (area) await notifyByArea(area, `Nueva etapa asignada — ${name}`, `Obra: ${p?.name||projectId}. Se te asignó la etapa "${name}".`, 'info');
    setTimeout(()=>renderProjectDetail(), 1000);
  } else { msg.style.color='var(--error)'; msg.textContent='Error al crear la etapa.'; }
}

async function agregarEquipo(projectId) {
  const select = document.getElementById('team-user-select');
  const isLead = document.getElementById('team-is-lead').checked;
  const msg    = document.getElementById('team-msg');
  if (!select.value) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Seleccioná un empleado.'; return; }

  const [userId, userName, userRole] = select.value.split('|');
  const cabeceras = ['4I','5I','4U','5U','5A','5E'];
  const esCabecera = cabeceras.includes(userRole);

  // Verificar carga si es cabecera
  if (esCabecera) {
    const obrasActuales = await db.query('project_team', `?user_id=eq.${userId}&select=project_id`) || [];
    const count = obrasActuales.length;
    const isCEO = currentUser.role === '5U';

    if (count >= 5 && !isCEO) {
      msg.style.display='block'; msg.style.color='var(--error)';
      msg.textContent=`${userName} ya tiene 5 obras asignadas. Límite máximo alcanzado.`;
      return;
    }
    if (count >= 4 && !isCEO) {
      await new Promise((res,rej)=>confirmarAccion(`⚠ ${userName} ya tiene ${count} obras. Agregar más puede generar sobrecarga. ¿Continuar?`,res));
    }
    if (count >= 3 && count < 4) {
      msg.style.display='block'; msg.style.color='var(--warn)';
      msg.textContent=`Aviso: ${userName} tendrá ${count+1} obras (cerca del límite recomendado).`;
    }
  }

  // Si es responsable, verificar que no haya otro
  if (isLead) {
    const currentLeads = await db.query('project_team', `?project_id=eq.${projectId}&is_lead=eq.true`) || [];
    if (currentLeads.length > 0) {
      await new Promise((res,rej)=>confirmarAccion('Ya hay un responsable asignado. ¿Reemplazarlo?',res));
      await db.patch('project_team', currentLeads[0].id, { is_lead: false });
    }
  }

  msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Agregando...';
  const result = await db.insert('project_team', {
    project_id: projectId,
    user_id: userId,
    user_name: userName,
    user_role: userRole,
    is_lead: isLead
  });

  if (result) {

async function guardarEdicionProyecto(projectId) {
  const name   = document.getElementById('ep-name').value.trim();
  const client = document.getElementById('ep-client').value.trim();
  const budget = parseFloat(document.getElementById('ep-budget').value) || 0;
  const desc   = document.getElementById('ep-desc').value.trim();
  const msg    = document.getElementById('ep-msg');
  if (!name) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='El nombre no puede estar vacío.'; return; }
  msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Guardando...';
  const result = await db.patch('projects', projectId, { name, client, budget, description: desc });
  if (result) {
    const p = PROJECTS.find(x=>x.id===projectId);
    if (p) { p.name=name; p.client=client; p.budget=budget; p.description=desc; }
    msg.style.color='var(--success)'; msg.textContent='✓ Obra actualizada.';
    setTimeout(()=>{ document.getElementById('edit-proj-modal').remove(); renderProjectDetail(); }, 1000);
  } else { msg.style.color='var(--error)'; msg.textContent='Error al guardar.'; }
}

// ─── TEAM ──────────────────────────────────────────────────────────────────────
async function renderTeam() {
  const area  = getArea(currentUser.role);
  const level = getLevel(currentUser.role);
  const el    = document.getElementById('view-team');
  el.innerHTML = `<div class="section-super">Módulo</div><div class="section-title">PERSONAL</div><div style="color:var(--textMuted);font-size:12px;padding:20px;text-align:center">Cargando...</div>`;

  // Determinar filtro según rol
  let query = '?select=id,name,role,province,region&role=neq.cliente&order=role';
  if (area==='U'&&level===1) {
    if (currentUser.province) query += `&province=eq.${encodeURIComponent(currentUser.province)}`;
  } else if (area==='U'&&level===2) {
    if (currentUser.region) query += `&region=eq.${encodeURIComponent(currentUser.region)}`;
  }

  const users = await db.query('users', query) || [];

  // Agrupar por región y provincia para CEO/regionales
  const REGIONES = {Norte:['Catamarca','Jujuy','Salta','Santiago del Estero','Chaco','Formosa','Misiones','Corrientes','Tucumán'],Centro:['Córdoba','La Rioja','San Luis','Mendoza','San Juan','Santa Fe','Entre Ríos'],Sur:['Buenos Aires','La Pampa','Neuquén','Río Negro','Chubut','Santa Cruz','Tierra del Fuego']};
  const AREA_NAMES = {A:'Mano de Obra',E:'Dibujo Técnico',I:'Dirección de Obra',O:'Administración',U:'Gobierno'};

  // Calcular obras activas por usuario
  const teamData = await db.query('project_team','?select=user_id,project_id') || [];
  const obrasPorUser = {};
  teamData.forEach(t=>{ obrasPorUser[t.user_id]=(obrasPorUser[t.user_id]||0)+1; });

  // Agrupar
  let html = `<div class="section-super">Módulo</div><div class="section-title">PERSONAL</div><div class="section-sub">${users.length} empleados</div>`;

  if (level>=3&&area==='U') {
    // CEO y regionales: ver por región → provincia
    const regions = level===2 ? [currentUser.region] : ['Norte','Centro','Sur'];
    regions.forEach(region=>{
      const provincias = REGIONES[region] || [];
      const regionUsers = users.filter(u=>u.region===region);
      if (!regionUsers.length) return;
      html += `<div style="margin-bottom:28px">
        <div style="font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--goldBorder)">Nodo ${region} — ${regionUsers.length} personas</div>`;
      provincias.forEach(prov=>{
        const provUsers = regionUsers.filter(u=>u.province===prov);
        if (!provUsers.length) return;
        html += `<div style="margin-bottom:16px">
          <div style="font-size:11px;color:var(--goldDim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">${prov}</div>
          <div class="col-stack-xs">${provUsers.map(u=>userCard(u,obrasPorUser)).join('')}</div>
        </div>`;
      });
      html += `</div>`;
    });
  } else {
    // Vista simple por área
    const areas = [...new Set(users.map(u=>u.role?u.role[1]:null).filter(Boolean))];
    areas.forEach(a=>{
      const aUsers = users.filter(u=>u.role&&u.role[1]===a);
      if (!aUsers.length) return;
      html += `<div style="margin-bottom:20px">
        <div style="font-size:11px;color:var(--goldDim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">${AREA_NAMES[a]||a}</div>
        <div class="col-stack-xs">${aUsers.map(u=>userCard(u,obrasPorUser)).join('')}</div>
      </div>`;
    });
  }

  el.innerHTML = html;
}

function userCard(u, obrasPorUser) {
  const obras = obrasPorUser[u.id] || 0;
  const cabeceras = ['4I','5I','4U','5U','5A','5E'];
  const esCab = cabeceras.includes(u.role);
  const loadColor = esCab ? (obras>=5?'var(--error)':obras>=4?'var(--warn)':obras>=3?'var(--goldDim)':'var(--success)') : 'var(--textMuted)';
  const loadLabel = esCab ? (obras>=5?'Sobrecargado':obras>=4?'Al límite':obras>=3?'Cargado':'Disponible') : '';
  return `<div class="card" style="display:flex;align-items:center;gap:12px">
    <div style="width:36px;height:36px;border-radius:50%;background:var(--bgPanel);border:1px solid var(--goldBorder);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gold);flex-shrink:0">${u.name?.charAt(0)||'?'}</div>
    <div style="flex:1">
      <div style="font-size:13px;color:var(--text);font-weight:600">${u.name}</div>
      <div style="font-size:10px;color:var(--textMuted)">${u.role} · ${ROLE_LABELS[u.role]||u.role} · ${u.province||'—'}</div>
    </div>
    ${esCab?`<div style="text-align:right;flex-shrink:0">
      <div style="font-size:12px;font-weight:700;color:${loadColor}">${obras} obra${obras!==1?'s':''}</div>
      <div style="font-size:9px;color:${loadColor};text-transform:uppercase;letter-spacing:.06em">${loadLabel}</div>
    </div>`:''}
  </div>`;
}

async function loadNotifications(canDelete) {
  const rows = await db.query('notifications', `?user_id=eq.${currentUser.id}&order=created_at.desc&limit=50`) || [];
  const list = document.getElementById('notif-list');
  if (!list) return;

  const icons  = {avance:'◈', alerta:'⚠', info:'◉', foto:'📷', pago:'$', plano:'◇', mensaje:'✉', anuncio:'📢'};
  const colors = {avance:'var(--success)', alerta:'var(--error)', info:'var(--goldDim)', foto:'var(--gold)', pago:'var(--success)', plano:'var(--goldDim)', mensaje:'var(--gold)', anuncio:'var(--warn)'};

  if (rows.length === 0) {
    list.innerHTML = `<div style="font-size:12px;color:var(--textMuted);padding:20px;text-align:center">Sin notificaciones por ahora</div>`;
    return;
  }

  list.innerHTML = rows.map(n => {
    const t = n.type || 'info';
    const time = n.created_at ? new Date(n.created_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    const color = colors[t] || 'var(--goldDim)';
    const icon  = icons[t]  || '◉';
    return `<div class="card" id="notif-${n.id}" style="opacity:${n.read?'.65':'1'};transition:opacity .2s">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div style="font-size:18px;color:${color};flex-shrink:0;margin-top:2px">${icon}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px">
            <div style="font-size:13px;font-weight:${n.read?'400':'700'};color:${n.read?'var(--textMuted)':'var(--text)'}">${n.title}</div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              ${!n.read?`<button class="btn btn-ghost" style="font-size:9px;padding:2px 8px" onclick="markNotifRead('${n.id}')">Leído</button>`:''}
              ${canDelete?`<button class="btn btn-ghost" style="font-size:9px;padding:2px 8px;color:var(--error)" onclick="deleteNotif('${n.id}')">✕</button>`:''}
            </div>
          </div>
          ${n.body?`
          <div style="font-size:12px;color:var(--textMuted);margin-bottom:6px;line-height:1.5">${n.body}</div>`:''}
          <div style="font-size:10px;color:var(--textMuted)">${time}${n.role_target?' · Para: '+n.role_target:''}</div>
        </div>
        ${!n.read?`<div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;margin-top:6px"></div>`:''}
      </div>
    </div>`;
  }).join('');
}

async function enviarBajadaLinea() {
  const title  = document.getElementById('bl-title').value.trim();
  const body   = document.getElementById('bl-body').value.trim();
  const target = document.getElementById('bl-target').value;
  const msg    = document.getElementById('bl-msg');
  const area   = getArea(currentUser.role);
  const level  = getLevel(currentUser.role);

  if (!title || !body) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Completá título y contenido.'; return; }

  msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Enviando...';

  let users = [];
  if (target === 'all') {
    users = await db.query('users','?select=id') || [];
  } else if (target === 'region') {
    const reg = currentUser.region||'';
    users = reg ? await db.query('users',`?region=eq.${encodeURIComponent(reg)}&select=id`) || [] : [];
  } else {
    // Solo mi área en mi localidad
    const prov = currentUser.province||'';
    const allUsers = await db.query('users',`?select=id,role,province`) || [];
    users = allUsers.filter(u => u.role && u.role.endsWith(area) && (!prov || u.province===prov));
  }

  for (const u of users) {
    await sendNotification(u.id, target, title, body, 'anuncio');
  }

  msg.style.color='var(--success)'; msg.textContent=`✓ Anuncio enviado a ${users.length} usuarios.`;
  document.getElementById('bl-title').value='';
  document.getElementById('bl-body').value='';
  setTimeout(()=>loadNotifications(currentUser.role==='5U'), 1000);
}

async function sendNotification(userId, roleTarget, title, body, type='info') {
  if (!userId && !roleTarget) return;
  await db.insert('notifications', { user_id: userId, role_target: roleTarget, title, body, type, read: false });
}

// Notificar a todos los usuarios de un rol específico
async function notifyByRole(role, title, body, type='info') {
  const users = await db.query('users', `?role=eq.${role}&select=id`) || [];
  for (const u of users) {
    await sendNotification(u.id, role, title, body, type);
  }
}

// Notificar a todos los usuarios de un área (ej: 'I' notifica a 1I,2I,3I,4I,5I)
async function notifyByArea(area, title, body, type='info') {
  const users = await db.query('users', `?select=id,role`) || [];
  const targets = users.filter(u => u.role && u.role.endsWith(area));
  for (const u of targets) {
    await sendNotification(u.id, u.role, title, body, type);
  }
}

// Notificar al equipo de una obra
async function notifyProjectTeam(projectId, title, body, type='info') {

  for (const m of team) {
    await sendNotification(m.user_id, null, title, body, type);

// Notificar al cliente de una obra
async function notifyClient(projectId, title, body, type='info') {
  const p = PROJECTS.find(x=>x.id===projectId);

  const users = await db.query('users', `?name=eq.${encodeURIComponent(p.client)}&select=id`) || [];

}

async function showTaskPhotos(taskId, taskName) {
  const modal = document.getElementById('task-photos-modal');
  if (!modal) return;
  modal.classList.remove('hidden');
  document.getElementById('modal-task-name').textContent = taskName;
  const photos = await db.query('photos', `?task_id=eq.${taskId}&order=created_at.desc`) || [];
  const content = document.getElementById('modal-photos-content');
  if (photos.length === 0) { content.innerHTML = '<div style="color:var(--textMuted);font-size:12px;padding:20px;text-align:center">Sin fotos cargadas para esta etapa</div>'; return; }
  content.innerHTML = photos.map(ph=>`<div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--goldBorder)">
    ${ph.url?`<img src="${ph.url}" style="width:100%;border-radius:2px;margin-bottom:8px;max-height:300px;object-fit:cover" />`:''}
    ${ph.observation?`<div style="font-size:12px;color:var(--text);margin-bottom:4px">${ph.observation}</div>`:''}
    <div style="font-size:10px;color:var(--textMuted)">${ph.created_at?new Date(ph.created_at).toLocaleString('es-AR'):''}</div>
  </div>`).join('');
}

async function enviarAlertaObra() {
  const tipo  = document.getElementById('alert-type').value;
  const body  = document.getElementById('alert-body').value.trim();
  const msg   = document.getElementById('alert-msg');
  if (!tipo || !body) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Seleccioná tipo y describí el problema.'; return; }
  const tipoLabel = {material:'Falta de materiales', clima:'Problema climático', accidente:'Accidente / Seguridad', otro:'Problema crítico'}[tipo] || tipo;
  const title = `🚨 ALERTA DE OBRA — ${tipoLabel}`;
  const fullBody = `Reportado por ${currentUser.name} (${ROLE_LABELS[currentUser.role]||currentUser.role}): ${body}`;
  msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Enviando alerta...';
  // Notificar a toda el Área I
  await notifyByArea('I', title, fullBody, 'alerta');
  // Notificar a Área U
  await notifyByArea('U', title, fullBody, 'alerta');
  msg.style.color='var(--error)'; msg.textContent='🚨 Alerta enviada a Dirección.';
  document.getElementById('alert-type').value='';
  document.getElementById('alert-body').value='';
}

async function rechazarConMotivo(taskId) {
  const existing = document.getElementById('rechazo-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'rechazo-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = `
    <div style="background:var(--bgCard);border:1px solid var(--goldBorder);border-radius:4px;padding:28px;max-width:400px;width:100%">
      <div style="font-size:14px;font-weight:700;color:var(--error);margin-bottom:16px">✕ Rechazar etapa</div>
      <div class="field" style="margin-bottom:12px"><div class="field-label">Motivo del rechazo</div>
        <textarea class="field-input" id="rm-motivo" placeholder="Describí el problema para que el equipo lo corrija..." style="height:80px;resize:none"></textarea>
      </div>
      <div id="rm-msg" style="font-size:11px;display:none;margin-bottom:12px"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" style="font-size:11px;color:var(--error);border-color:var(--error)" onclick="confirmarRechazo('${taskId}')">Rechazar</button>
        <button class="btn btn-ghost" style="font-size:11px" onclick="document.getElementById('rechazo-modal').remove()">Cancelar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function confirmarRechazo(taskId) {
  const motivo = document.getElementById('rm-motivo').value.trim();
  const msg    = document.getElementById('rm-msg');
  if (!motivo) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Escribí el motivo.'; return; }
  document.getElementById('rechazo-modal').remove();
  await changeTaskStatus(taskId, 'Haciendo', 'view-mytasks');
  // Notificar con el motivo
  const task = PROJECTS.flatMap(p=>p.tasks).find(t=>t.id===taskId);
  const proj = PROJECTS.find(p=>p.tasks.some(t=>t.id===taskId));
  const area = task?.level?.[1];
  if (area) await notifyByArea(area, `Etapa rechazada — ${task?.name||taskId}`, `Motivo: ${motivo}. Obra: ${proj?.name||''}`, 'alerta');
}

async function eliminarTareaDesdeVista(taskId, projectId) {
  confirmarAccion('¿Eliminar esta tarea? No se puede deshacer.', async () => {
    await db.delete('tasks', taskId);
    PROJECTS.forEach(p => { p.tasks = p.tasks.filter(t=>t.id!==taskId); });
    renderMyTasks();
  });
}

  const fileInput= document.getElementById('doc-file');
  const msg      = document.getElementById('doc-msg');
  if (!name) { msg.style.display='block'; msg.style.color='var(--error)'; msg.textContent='Ingresá el nombre del plano.'; return; }
  msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Guardando...';

  let fileUrl = urlInput || null;
  const file = fileInput?.files?.[0];
  if (file) {
    msg.textContent = 'Subiendo archivo...';
    fileUrl = await uploadFileToStorage(file, `planos/${_uploadDocProjectId}`);
    if (!fileUrl) { msg.style.color='var(--error)'; msg.textContent='Error al subir el archivo.'; return; }
  }

  const result = await db.insert('documents', {
    project_id: _uploadDocProjectId,
    task_id: _uploadDocTaskId,
    name, version,
    url: fileUrl,
    uploaded_by: currentUser.id,
    type: 'plano'
  });
  if (result) {
    msg.style.color='var(--success)'; msg.textContent='✓ Plano guardado correctamente.';
    const p = PROJECTS.find(x=>x.id===_uploadDocProjectId);
    if (p) await notifyByArea('I', `Nuevo plano — ${name}`, `${p.name}: ${currentUser.name} subió "${name}" (${version}).`, 'plano');
    setTimeout(()=>{ renderMyTasks(); document.getElementById('upload-doc-zone').classList.add('hidden'); }, 1200);
  } else { msg.style.color='var(--error)'; msg.textContent='Error al guardar.'; }
}

async function uploadFileToStorage(file, folder) {
  const ext = file.name.split('.').pop();
  const fileName = `${folder}/${Date.now()}_${Math.random().toString(36).substr(2,6)}.${ext}`;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/archivos/${fileName}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': file.type,
      'x-upsert': 'true'
    },
    body: file
  });
  if (!res.ok) { console.warn('Upload error:', await res.text()); return null; }
  return `${SUPABASE_URL}/storage/v1/object/public/archivos/${fileName}`;
}

async function submitPhoto(taskId, projectId) {
  const obs       = document.getElementById(`obs-${taskId}`)?.value.trim() || '';
  const fileInput = document.getElementById(`file-${taskId}`);
  const msg       = document.getElementById(`upload-msg-${taskId}`);
  const file      = fileInput?.files?.[0];

  if (msg) { msg.style.display='block'; msg.style.color='var(--goldDim)'; msg.textContent='Guardando...'; }

  let fileUrl = null;
  if (file) {
    if (msg) msg.textContent = 'Subiendo archivo...';
    fileUrl = await uploadFileToStorage(file, `fotos/${projectId}`);
    if (!fileUrl && msg) { msg.style.color='var(--error)'; msg.textContent='Error al subir el archivo.'; return; }
  }

  const result = await db.insert('photos', {
    task_id: taskId,
    project_id: projectId,
    user_id: currentUser.id,
    url: fileUrl,
    observation: obs || 'Sin observación'
  });

  if (result) {
    const task = PROJECTS.flatMap(p=>p.tasks).find(t=>t.id===taskId);
    if (task) {
      task.photos = (task.photos||0) + 1;
      await db.patch('tasks', taskId, { photos: task.photos });
    }
    if (msg) { msg.style.color='var(--success)'; msg.textContent='✓ Registro guardado.'; }
    setTimeout(()=>renderMyTasks(), 1200);
  } else {
    if (msg) { msg.style.color='var(--error)'; msg.textContent='Error al guardar en base de datos.'; }
  }
}

async function changeTaskStatus(taskId, newStatus, viewId) {
  // Buscar tarea y proyecto
  let foundTask = null, foundProject = null;
  PROJECTS.forEach(p => {
    const t = p.tasks.find(t=>t.id===taskId);
    if (t) { foundTask = t; foundProject = p; t.status = newStatus; }
  });

  // Guardar en Supabase
  await db.patch('tasks', taskId, { status: newStatus });

  // Notificaciones automáticas según el nuevo estado
  if (foundTask && foundProject) {
    const taskName = foundTask.name;
    const projName = foundProject.name;
    const projId   = foundProject.id;

    if (newStatus === 'Revisión') {
      // Empleado envía a revisión → notificar al Área I
      await notifyByArea('I', `Avance para revisión — ${taskName}`, `${projName}: ${taskName} fue enviada a revisión por ${currentUser.name}`, 'avance');
    }
    if (newStatus === 'Cerrado') {
      // Tarea aprobada → notificar al equipo de la obra y al cliente
      await notifyProjectTeam(projId, `Etapa aprobada — ${taskName}`, `${projName}: La etapa "${taskName}" fue aprobada y cerrada.`, 'avance');
      await notifyClient(projId, `Tu obra avanzó — ${projName}`, `La etapa "${taskName}" fue completada. Tu obra continúa avanzando.`, 'avance');
    }
    if (newStatus === 'Haciendo') {
      // Si viene de Revisión = rechazado → notificar al empleado asignado
      const area = foundTask.level ? foundTask.level[1] : null;
      if (area) await notifyByArea(area, `Etapa rechazada — ${taskName}`, `${projName}: La etapa "${taskName}" fue rechazada. Revisá las observaciones.`, 'alerta');
    }
    if (newStatus === 'Pendiente') {
      // Tarea nueva asignada → notificar al área correspondiente
      const area = foundTask.level ? foundTask.level[1] : null;
      if (area) await notifyByArea(area, `Nueva tarea asignada — ${taskName}`, `Obra: ${projName}. Tarea: "${taskName}" asignada a tu área.`, 'info');
    }
  }

  renderCurrentView();
}

async function cargarFinanzas(puedeRegistrar, puedeAprobar, puedeVerNomina, puedeCajas, puedeEditarParam, esReadOnly, fmt, area, level) {
  const el = document.getElementById('fin-contenido');
  if (!el) return;

  const mesEl  = document.getElementById('fin-mes');
  const anioEl = document.getElementById('fin-anio');
  const mes    = mesEl  ? parseInt(mesEl.value)  : -1;
  const anio   = anioEl ? parseInt(anioEl.value) : new Date().getFullYear();

  // Cargar todos los movimientos
  const allMovs = await db.query('movements','?order=created_at.desc') || [];

  // Filtrar por fecha
  const filtrar = m => {
    if (!m.created_at) return true;
    const d = new Date(m.created_at);
    if (anio && d.getFullYear() !== anio) return false;
    if (mes >= 0 && d.getMonth() !== mes) return false;
    return true;
  };

  const movs       = allMovs.filter(filtrar);
  const aprobados  = movs.filter(m=>m.status==='aprobado');
  const pendientes = movs.filter(m=>m.status==='pendiente');
  const ingresos   = aprobados.filter(m=>m.type==='ingreso').reduce((a,m)=>a+Number(m.amount),0);
  const egresos    = aprobados.filter(m=>m.type==='egreso').reduce((a,m)=>a+Number(m.amount),0);
  const saldo      = ingresos - egresos;

  // KPIs por mes para gráfico (últimos 6 meses)
  const mesesLabel = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const now = new Date();
  const grafData = [];
  for (let i=5; i>=0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const mm = d.getMonth(); const aa = d.getFullYear();
    const mMovs = allMovs.filter(m=>{ const md=new Date(m.created_at); return md.getMonth()===mm&&md.getFullYear()===aa&&m.status==='aprobado'; });
    grafData.push({
      label: mesesLabel[mm],
      ing: mMovs.filter(m=>m.type==='ingreso').reduce((a,m)=>a+Number(m.amount),0),
      egr: mMovs.filter(m=>m.type==='egreso').reduce((a,m)=>a+Number(m.amount),0),
    });
  }
  const maxVal = Math.max(...grafData.map(d=>Math.max(d.ing,d.egr)),1);

  // Agrupar por categoría para torta
  const catMap = {};
  aprobados.filter(m=>m.type==='egreso').forEach(m=>{
    const c = m.category||'otro';
    catMap[c] = (catMap[c]||0)+Number(m.amount);
  });
  const catColors = {honorarios:'var(--gold)',materiales:'var(--goldDim)',nomina:'var(--success)',proveedor:'var(--warn)',impuesto:'var(--error)',otro:'var(--textMuted)'};

  // Label período
  const periodoLabel = mes>=0 ? `${mesesLabel[mes]} ${anio}` : `Año ${anio}`;
  const labelEl = document.getElementById('fin-periodo-label');
  if (labelEl) labelEl.textContent = periodoLabel;

  el.innerHTML = `
    <!-- KPIs -->
    <div class="grid-4" style="margin-bottom:24px">
      <div class="card"><div class="kpi-icon" style="color:var(--success)">↑</div><div class="kpi-value" style="color:var(--success);font-size:18px">${fmt(ingresos)}</div><div class="kpi-label">Ingresos</div></div>
      <div class="card"><div class="kpi-icon" style="color:var(--error)">↓</div><div class="kpi-value" style="color:var(--error);font-size:18px">${fmt(egresos)}</div><div class="kpi-label">Egresos</div></div>
      <div class="card"><div class="kpi-icon" style="color:var(--gold)">◈</div><div class="kpi-value" style="color:${saldo>=0?'var(--success)':'var(--error)'};font-size:18px">${fmt(saldo)}</div><div class="kpi-label">Saldo</div></div>
      <div class="card"><div class="kpi-icon" style="color:var(--warn)">⏳</div><div class="kpi-value" style="color:var(--warn);font-size:18px">${pendientes.length}</div><div class="kpi-label">Pendientes</div></div>
    </div>

    <!-- GRÁFICO BARRAS — últimos 6 meses -->
    <div class="card" style="margin-bottom:24px">
      <div style="font-size:12px;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px">Evolución últimos 6 meses</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:120px;padding-bottom:4px">
        ${grafData.map(d=>`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
          <div style="display:flex;gap:2px;align-items:flex-end;width:100%;height:100px">
            <div style="flex:1;background:var(--success);opacity:.7;border-radius:2px 2px 0 0;height:${Math.round(d.ing/maxVal*100)}%;min-height:2px;transition:height .3s"></div>
            <div style="flex:1;background:var(--error);opacity:.7;border-radius:2px 2px 0 0;height:${Math.round(d.egr/maxVal*100)}%;min-height:2px;transition:height .3s"></div>
          </div>
          <div style="font-size:9px;color:var(--textMuted);text-align:center">${d.label}</div>
        </div>`).join('')}
      </div>
      <div style="display:flex;gap:16px;margin-top:8px">
        <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;background:var(--success);opacity:.7;border-radius:1px"></div><span style="font-size:10px;color:var(--textMuted)">Ingresos</span></div>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;background:var(--error);opacity:.7;border-radius:1px"></div><span style="font-size:10px;color:var(--textMuted)">Egresos</span></div>
      </div>
    </div>

    <!-- DISTRIBUCIÓN EGRESOS -->
    ${Object.keys(catMap).length>0?`
    <div class="card" style="margin-bottom:24px">

      Movimientos — ${periodoLabel}

      ${aprobados.length===0?`<div style="font-size:12px;color:var(--textMuted);padding:20px;text-align:center">Sin movimientos en este período</div>`:
